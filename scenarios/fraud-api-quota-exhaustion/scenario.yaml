remediation_actions:
  - id: enable_circuit_breaker
    type: toggle_feature_flag
    service: checkout-service
    is_correct_fix: true
    flag_id: FRAUD_CIRCUIT_BREAKER
    flag_enabled: true
    label: "Enable fraud circuit breaker (fail-open)"
    side_effect: "Checkout resumes. Fraud risk accepted — orders proceed without scoring. Monitor for fraud volume."

  - id: rollback_checkout
    type: rollback
    service: checkout-service
    is_correct_fix: false
    target_version: v2.8.2
    side_effect: "Rollback has no effect — the issue is FraudShield's API quota, not checkout-service code. Fault rate unchanged."

  - id: restart_checkout
    type: restart_service
    service: checkout-service
    is_correct_fix: false
    side_effect: "Restart has no effect — FraudShield API continues returning 429. Fault rate returns to 40% within seconds."

evaluation:
  root_cause: >
    FraudShield third-party fraud scoring API exhausted checkout-service's monthly
    API quota 3 days early due to a vendor billing tier misconfiguration. All fraud
    scoring calls return 429. This is entirely vendor-side — no code change or
    infrastructure action can fix it. The correct mitigation is to enable the
    FRAUD_CIRCUIT_BREAKER feature flag (fail-open mode) after VP Engineering approval,
    restoring checkout at the cost of temporarily bypassing fraud scoring.

  relevant_actions:
    - action: search_logs
      why: "Logs immediately show HTTP 429 from api.fraudshield.io with X-RateLimit-Remaining: 0 — confirms vendor quota issue."
    - action: read_wiki_page
      why: "FraudShield Outage Playbook documents the circuit breaker option and VP approval requirement."
    - action: direct_message_persona
      why: "Paging Raj Patel (VP Eng) is required before enabling the circuit breaker — this is a business risk decision."
    - action: toggle_feature_flag
      why: "Enabling FRAUD_CIRCUIT_BREAKER after VP approval restores checkout."
      service: checkout-service
      remediation_action_id: enable_circuit_breaker
    - action: monitor_recovery
      why: "Fault rate should drop to ~0% within 30 seconds of enabling the circuit breaker."

  red_herrings:
    - action: trigger_rollback
      why: "The last deploy was 3 days ago and unrelated. Rolling back has zero effect on FraudShield's API quota."
    - action: restart_service
      why: "Restarting the service doesn't change the vendor's API quota state — 429s continue immediately."
    - action: scale_cluster
      why: "More instances make more fraud API calls, potentially exhausting quota faster. Makes it worse."

  debrief_context: |
    This scenario tests recognising when the root cause is external and outside
    your control. The key skills: reading logs to identify the vendor error (HTTP 429,
    X-RateLimit-Remaining: 0), not wasting time on code rollbacks or restarts, and
    knowing when to escalate for a business decision (enabling fail-open mode).

    The unusual pattern here: fault_rate spikes while error_rate stays near zero —
    because 429s from a dependency manifest as 5xx to clients (fault), not 4xx (error).
    This is a useful distinction to learn.

    Common mistakes: (1) rolling back the service (unrelated), (2) not reading the
    wiki playbook before acting, (3) enabling the circuit breaker without VP approval.
