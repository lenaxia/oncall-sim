id: fraud-api-quota-exhaustion
title: "Checkout Service: Fraud API Rate Limit — External Dependency"
description: >
  Checkout is failing for a subset of customers. The fraud scoring API is
  returning errors. You can't fix the vendor's infrastructure — your job is
  to diagnose, communicate, and implement the right mitigation.
difficulty: medium
tags: [third-party, rate-limit, circuit-breaker, checkout, fault-rate]

timeline:
  default_speed: 2
  duration_minutes: 20
  pre_incident_seconds: 21600

topology:
  focal_service:
    name: checkout-service
    description: "Checkout and payment orchestration service. Calls FraudShield API synchronously on every checkout."
    owner: nina-okafor
    typical_rps: 180
    traffic_profile: business_hours_web
    health: healthy
    components:
      - id: alb
        type: load_balancer
        label: "ALB"
        inputs: []
      - id: ecs
        type: ecs_cluster
        label: "checkout-service ECS"
        instance_count: 4
        utilization: 0.50
        inputs: [alb]
      - id: checkout_db
        type: rds
        label: "checkout-db (RDS)"
        instance_count: 1
        max_connections: 100
        utilization: 0.30
        connection_utilization: 0.25
        inputs: [ecs]
    incidents:
      - id: fraud_api_outage
        affected_component: ecs
        description: "FraudShield API returning 429 Too Many Requests — checkout-service has exhausted its monthly API quota 3 days early due to a billing tier misconfiguration. All fraud scoring calls fail, causing checkout failures. fault_rate spikes to ~40%."
        onset_overlay: spike_and_sustain
        onset_second: 10800 # incident starts 3h before session open (1h into the 4h chart window)
        magnitude: 20.0
        ramp_duration_seconds: 0
        propagation_direction: both # ECS is the affected service — alb upstream sees fault_rate spike, rds downstream sees load
  upstream:
    - name: storefront
      description: "Customer-facing web/mobile checkout flow."
  downstream:
    - name: fraud-shield-api
      description: "FraudShield third-party fraud scoring API. Currently returning 429."
      correlation: independent
    - name: payment-processor
      description: "Stripe payment processing. Healthy — only reached after fraud check passes."
      correlation: exonerated

engine:
  default_tab: wiki
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 3

personas:
  - id: nina-okafor
    display_name: "Nina Okafor"
    job_title: "Senior Software Engineer"
    team: "Checkout"
    avatar_color: "#EC4899"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Nina Okafor, Senior SWE on the Checkout team. You own checkout-service.
      You've identified that the FraudShield API is returning 429s — quota exhausted.

      You know checkout-service has a circuit breaker feature flag (FRAUD_CIRCUIT_BREAKER)
      that enables fail-open mode: if fraud scoring fails, the request passes through
      without scoring (accept the fraud risk temporarily). This is the intended mitigation
      for fraud API outages.

      You're unsure if enabling the circuit breaker is the right call — it accepts
      fraud risk. Share this trade-off if the trainee asks about options.

      If asked about the vendor: "FraudShield support says the 429s are on their side —
      a billing tier misconfiguration capped our API calls 3 days early. They're working
      on it but ETA is unknown."

      Keep responses concise (1-3 sentences). Professional tone.

  - id: raj-patel
    display_name: "Raj Patel"
    job_title: "VP Engineering"
    team: "Engineering"
    avatar_color: "#6366F1"
    initiates_contact: false
    cooldown_seconds: 300
    silent_until_contacted: true
    system_prompt: |
      You are Raj Patel, VP Engineering. You have authority to approve enabling
      the fraud circuit breaker (fail-open mode), which accepts fraud risk.
      If the trainee pages you and explains the situation, you approve it.

      "Thanks for the heads up. Given FraudShield ETA is unknown and checkout is
      down, enable the circuit breaker. Accept the fraud risk for now — the exposure
      is manageable for a few hours. Page me if it goes beyond 4 hours or if fraud
      volume looks abnormal."

      Be direct. One or two sentences max.

email:
  - id: email-001
    at_second: 0
    thread_id: thread-checkout-fraud
    from: nina-okafor
    to: trainee
    subject: "[ALERT] checkout-service: 40% fault rate — FraudShield API returning 429"
    body: |
      Hey,

      checkout-service fault rate just spiked to ~40%. Looking at the logs —
      every fraud scoring call to FraudShield is returning 429 Too Many Requests.

      Opened CHK-542. This is impacting checkout for all customers (fraud check
      is in the critical path).

      Need to decide whether to enable the circuit breaker (fail-open) while we
      wait on FraudShield. That's a business call — probably needs VP sign-off.

      — Nina

  - id: email-002
    at_second: 180
    thread_id: thread-checkout-fraud
    from: nina-okafor
    to: trainee
    subject: "[ALERT] checkout-service: 40% fault rate — FraudShield API returning 429"
    body: |
      Update: confirmed with FraudShield support — billing tier misconfiguration
      capped our quota early. Their ETA for fix is "investigating."

      DB and payment processor are healthy. This is 100% FraudShield.

      Circuit breaker is ready to enable — FRAUD_CIRCUIT_BREAKER feature flag.
      Just needs a go-ahead from someone with authority.

      — Nina

