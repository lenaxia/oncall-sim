log_patterns:
  - id: fraud-429
    level: ERROR
    service: checkout-service
    message: "FraudShield API error: HTTP 429 Too Many Requests — X-RateLimit-Remaining: 0"
    interval_seconds: 8
    from_second: 8
    to_second: 1200
    jitter_seconds: 2

  - id: checkout-fail
    level: ERROR
    service: checkout-service
    message: "Checkout failed: fraud_check_error=QUOTA_EXCEEDED"
    interval_seconds: 10
    from_second: 5
    to_second: 1200
    jitter_seconds: 3

background_logs:
  - profile: nodejs_api
    service: checkout-service
    from_second: -300
    to_second: 1200
    density: medium

wiki:
  pages:
    - title: "checkout-service Runbook"
      content: |
        # checkout-service Runbook

        ## Architecture

        checkout-service calls FraudShield API synchronously on every checkout.
        The fraud check is in the critical path — failures cause checkout failures.

        ## FraudShield API Outage Playbook

        If FraudShield returns 429 (quota) or 5xx (outage):

        1. **Confirm it's FraudShield**: check logs for HTTP 429/5xx from `api.fraudshield.io`
        2. **Check FraudShield status page**: https://status.fraudshield.io
        3. **Assess duration**: contact FraudShield support for ETA
        4. **Decision tree**:
           - ETA < 15 min: wait, monitor
           - ETA unknown or > 15 min: escalate to VP Eng for circuit breaker approval

        ## Circuit Breaker (FRAUD_CIRCUIT_BREAKER Feature Flag)

        When enabled, checkout-service operates in **fail-open** mode:
        - Fraud API failures are treated as "pass" (no fraud detected)
        - Orders proceed to payment without fraud scoring
        - **Fraud risk accepted** — requires VP Engineering approval

        To enable:
        1. Get VP Eng approval (page @raj-patel for SEV1)
        2. Toggle FRAUD_CIRCUIT_BREAKER = true in feature flag console
        3. Monitor fault_rate — should drop to ~0% within 30 seconds
        4. Notify FraudShield support that you're operating in bypass mode

    - title: "Vendor Incident Management"
      content: |
        # Vendor Incident Management

        ## Key Contacts

        - **FraudShield support**: support@fraudshield.io, +1-800-555-0100
        - **FraudShield status**: https://status.fraudshield.io
        - **Account ID**: FS-ACME-10042

        ## Escalation for Vendor Outages

        1. Confirm root cause is vendor (not your code)
        2. Contact vendor support with incident details
        3. Implement mitigation if available (circuit breaker, fallback)
        4. Communicate impact to stakeholders
        5. Post-incident: review vendor SLA, evaluate alternatives

feature_flags:
