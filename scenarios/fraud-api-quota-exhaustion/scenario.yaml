    at_second: 0
    level: ERROR
    service: checkout-service
    message: "FraudShield API error: HTTP 429 Too Many Requests — X-RateLimit-Remaining: 0, X-RateLimit-Reset: 1746662400"
  - id: log-002
    at_second: 0
    level: ERROR
    service: checkout-service
    message: "FraudShield API error: HTTP 429 Too Many Requests — X-RateLimit-Remaining: 0, X-RateLimit-Reset: 1746662400"
