ticketing:
  - id: CHK-542
    title: "checkout-service: FraudShield API quota exhausted — checkout failing"
    severity: SEV1
    status: open
    description: |
      ## Summary

      checkout-service fault rate ~40%. FraudShield fraud scoring API returning 429
      Too Many Requests — monthly API quota exhausted 3 days early due to vendor
      billing tier misconfiguration.

      ## Symptoms

      - Fault rate: ~40% (all FraudShield calls failing)
      - Error rate: 0% (no 4xx client errors — failures are 5xx from fraud API)
      - DB: healthy
      - Payment processor: healthy (never reached — fraud check in critical path)
      - FraudShield status page: degraded (quota management issue)

      ## Impact

      All checkout attempts that reach fraud scoring fail. Approximately 40% of
      checkout requests are affected (some succeed due to cache hits on previously
      scored sessions).

      ## Options

      1. **Wait for FraudShield fix** — ETA unknown, checkout remains degraded
      2. **Enable circuit breaker** (FRAUD_CIRCUIT_BREAKER flag) — fail-open on fraud
         scoring, checkout resumes but without fraud protection. Needs VP approval.
      3. **Upgrade API tier** — contact FraudShield billing to increase quota. ETA hours.

    created_by: nina-okafor
    assignee: trainee
    at_second: -60

alarms:
  - id: alarm-fault-rate
    service: checkout-service
    metric_id: fault_rate
    condition: "fault_rate > 5%"
    severity: SEV1
    threshold: 5
    auto_fire: true
    auto_page: true
    page_message: "checkout-service fault rate exceeded 5%. Checkout degraded — investigate immediately."

logs:
