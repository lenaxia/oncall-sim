log_patterns:
  - id: worker-oom-kill
    level: ERROR
    service: notification-service
    message: "Worker-{n} OOM killed — RSS: {n}GB. Restarting... In-flight messages released back to queue."
    interval_seconds: 600
    from_second: 0
    to_second: 480 # stops after rollback
    jitter_seconds: 60

  - id: memory-growth-warn
    level: WARN
    service: notification-service
    message: "Worker memory growing: Worker-1={n}MB Worker-2={n}MB Worker-3={n}MB Worker-4={n}MB. Jinja2 environment references not released."
    interval_seconds: 45
    from_second: 0
    to_second: 480
    jitter_seconds: 10

  - id: jinja-env-leak
    level: DEBUG
    service: notification-service
    message: "Jinja2 template rendered: email/{n}.html (instance=<jinja2.Environment object at 0x7f{n}> — NOT released after render)"
    interval_seconds: 8
    from_second: 0
    to_second: 480
    jitter_seconds: 2

  - id: gc-pressure
    level: WARN
    service: notification-service
    message: "GC pressure: {n}ms pause (gen2 collection). Memory not freed — live references prevent collection of template objects."
    interval_seconds: 30
    from_second: 0
    to_second: 480
    jitter_seconds: 8

  - id: visibility-timeout-expire
    level: WARN
    service: notification-service
    message: "SQS visibility timeout expired (30s) for msg_id=notif-{n} type={n}. Message requeued by SQS. Another worker may pick it up."
    interval_seconds: 30
    from_second: 5
    to_second: 1500
    jitter_seconds: 8

  - id: duplicate-receive
    level: WARN
    service: notification-service
    message: "Duplicate message received: msg_id=notif-{n} already delivered by Worker-{n}. Processing again due to SQS at-least-once delivery."
    interval_seconds: 25
    from_second: 20
    to_second: 1500
    jitter_seconds: 7

  - id: duplicate-delivery-error
    level: ERROR
    service: notification-service
    message: "SQS delete failed for notif-{n}: MessageNotInflight. Message was already deleted by another consumer. DUPLICATE DELIVERY CONFIRMED."
    interval_seconds: 40
    from_second: 90
    to_second: 1500
    jitter_seconds: 12

  - id: sms-long-processing
    level: INFO
    service: notification-service
    message: "Processing SMS notification: msg_id=notif-{n} type=order_confirmation via=twilio estimated_duration=45-180s (visibility_timeout=30s — MISMATCH)"
    interval_seconds: 15
    from_second: 0
    to_second: 1500
    jitter_seconds: 5

  - id: dlq-message-moved
    level: ERROR
    service: notification-service
    message: "Message notif-{n} reached maxReceiveCount=3. Moving to DLQ. Last error: processing exceeded visibility timeout (30s) causing {n} requeue cycles."
    interval_seconds: 60
    from_second: 120
    to_second: 1500
    jitter_seconds: 15

  - id: inflight-lost-on-restart
    level: WARN
    service: notification-service
    message: "Worker restart: {n} in-flight messages released. Will become visible again in {n}s (visibility_timeout=30s)."
    interval_seconds: 600
    from_second: 3
    to_second: 480
    jitter_seconds: 30

  # Post-rollback: memory leak gone, but visibility timeout issue continues
  - id: post-rollback-stable-memory
    level: INFO
    service: notification-service
    message: "POST-ROLLBACK v3.0.8: Worker memory stable. Worker-1=247MB Worker-2=251MB Worker-3=244MB Worker-4=249MB. No GC pressure."
    interval_seconds: 60
    from_second: 500
    to_second: 1500
    jitter_seconds: 10

  - id: post-rollback-dlq-still-growing
    level: WARN
    service: notification-service
    message: "DLQ still growing post-rollback: {n} messages. Visibility timeout (30s) still causing SMS message requeuing."
    interval_seconds: 90
    from_second: 540
    to_second: 1500
    jitter_seconds: 15

  - id: twilio-retry-timeout-mismatch
    level: WARN
    service: notification-service
    message: "Twilio delivery pending: msg_id=notif-{n} elapsed={n}s > visibility_timeout=30s. SQS will requeue this message before Twilio confirms delivery."
    interval_seconds: 35
    from_second: 0
    to_second: 1500
    jitter_seconds: 8

  - id: sqs-inflight-high
    level: WARN
    service: notification-service
    message: "SQS ApproximateNumberOfMessagesNotVisible={n} (messages currently being processed or waiting for visibility timeout). High value indicates requeuing loop."
    interval_seconds: 60
    from_second: 30
    to_second: 1500
    jitter_seconds: 10

  - id: receive-count-warn
    level: WARN
    service: notification-service
    message: "High receive count for msg_id=notif-{n}: received {n} times (maxReceiveCount=3). Likely cause: visibility timeout shorter than processing time."
    interval_seconds: 45
    from_second: 60
    to_second: 1500
    jitter_seconds: 12

background_logs:
  - profile: python_worker
    service: notification-service
    from_second: -300
