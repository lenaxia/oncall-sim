ticketing:
  - id: NOTIF-4421
    title: "notification-service: DLQ filling + worker OOM kills — active SEV2"
    severity: SEV2
    status: open
    description: |
      ## Summary

      notification-service is experiencing two simultaneous issues causing DLQ backpressure
      and duplicate notification delivery.

      ## Issue 1: Worker OOM-Kill (Memory Leak — v3.1.0)

      Workers are dying every ~10 minutes due to a memory leak in the Jinja2 email template
      renderer. Each rendered template retains a reference to the Jinja2 environment object,
      preventing garbage collection. RSS memory grows until OOM-kill.

      - Worker restarts: 6 in last hour
      - Memory growth rate: ~180MB/minute per worker
      - Expected recovery: rollback to v3.0.8

      ## Issue 2: DLQ Fill (visibility timeout + processing time mismatch)

      **Initially attributed to Issue 1. May have a separate root cause.**

      SQS visibility timeout: **30 seconds**
      Average processing time (email): **4 seconds**
      Average processing time (SMS with retries): **45-180 seconds**
      Average processing time (push): **1-3 seconds**

      If visibility timeout < processing time → SQS makes message visible again →
      second worker picks up the same message → duplicate delivery → potential DLQ fill
      if processing fails after first delivery.

      ## Metrics

      - Queue depth: 4,847 messages (growing)
      - DLQ depth: 312 messages (+47/5min, growing)
      - Duplicate delivery rate: 23%

    created_by: diana-walsh
    assignee: trainee
    at_second: -60

  - id: NOTIF-4422
    title: "Customer complaints: duplicate SMS notifications — 14 reports"
    severity: SEV3
    status: open
    description: |
      14 customers have filed support tickets reporting duplicate SMS messages:
      - Order confirmation SMS sent twice
      - Password reset SMS sent twice (security concern)
      - 2FA codes sent twice (only the first is valid — second causes confusion)

      Pattern: all duplicates have timestamps ~30-60 seconds apart.
      This aligns with SQS visibility timeout (30s) causing re-delivery while
      original message is still being processed.

      Started approximately 3 weeks ago (correlates with IaC PR #7834).

    created_by: ops-monitor-bot
    assignee: trainee
    at_second: 900

alarms:
  - id: alarm-dlq-depth
    service: notification-service
    metric_id: queue_depth
    condition: "DLQ depth > 100"
    severity: SEV2
    auto_fire: true
    auto_page: true
    onset_second: -10800
    page_message: "notifications-dlq has >100 messages. Check for worker failures or processing errors."
  - id: alarm-queue-age
    service: notification-service
    metric_id: queue_age_ms
    condition: "queue_age_p99 > 300000ms (5 minutes)"
    severity: SEV2
    auto_fire: true
    auto_page: false
    onset_second: -10680
  - id: alarm-worker-memory
    service: notification-service
    metric_id: memory_jvm
    condition: "worker RSS memory > 1.8GB"
    severity: SEV3
    auto_fire: true
    auto_page: false
    onset_second: -10800

