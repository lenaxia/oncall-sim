schema_version: 1
id: sqs-visibility-timeout-memory-leak
title: "Notification Service: Two Overlapping Incidents, One Partial Fix"
description: >
  notification-service is degrading and the DLQ is filling. You fix the memory
  leak and declare victory. Then the DLQ starts growing again. Something else
  is wrong — and it was wrong the whole time.
difficulty: hard
tags:
  [sqs, visibility-timeout, memory-leak, dlq, dual-root-cause, notifications]

timeline:
  default_speed: 2
  duration_minutes: 25
  pre_incident_seconds: 43200

engine:
  default_tab: logs
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 3

topology:
  focal_service:
    name: notification-service
    description: >
      Python/Celery notification service — consumes SQS messages and dispatches
      email, push, and SMS notifications. Long-polling SQS consumer with 4 workers
      per ECS task. Processes ~800 messages/minute at baseline.
    owner: diana-walsh
    typical_rps: 1 # queue-based service — RPS not applicable
    traffic_profile: always_on_api
    health: degraded
    components:
      - id: sqs_notifications
        type: sqs_queue
        label: "notifications-queue (standard)"
        inputs: []
      - id: ecs_workers
        type: ecs_cluster
        label: "notification-workers ECS (Fargate)"
        instance_count: 4
        utilization: 0.88
        inputs: [sqs_notifications]
      - id: sqs_dlq
        type: sqs_queue
        label: "notifications-dlq (dead letter queue)"
        inputs: [sqs_notifications]
    incidents:
      - id: memory_leak_oom
        affected_component: ecs_workers
        description: >
          v3.1.0 introduced a memory leak in the email template renderer — each rendered
          template retains a reference to the Jinja2 environment, preventing GC. Workers
          run normally for 8-12 minutes then OOM-kill and restart. Restart takes ~45s.
          During restart: no consumers on the queue → messages accumulate. After restart:
          consumers resume but start leaking again immediately.
        onset_overlay: gradual_degradation
        onset_second: -10800
        magnitude: 3.2
        propagation_direction: upstream
      - id: visibility_timeout_duplicate_delivery
        affected_component: sqs_notifications
        description: >
          Separate from the memory leak: SQS visibility timeout was changed from 300s
          to 30s in an infrastructure config PR 3 weeks ago ("reduce visibility timeout
          for faster DLQ promotion"). Notification processing takes 45-180 seconds for
          SMS/email with retries. When a worker takes >30s to process a message, SQS
          makes the message visible again — a second worker picks it up. Both workers
          complete processing (duplicate notification sent), both try to delete the
          message. One succeeds. But: if the OOM-kill happens mid-processing, the
          message becomes visible at T+30s (not T+300s). This dramatically accelerates
          DLQ fill and causes the DLQ count to grow even after the memory leak is fixed.
        onset_overlay: spike_and_sustain
        onset_second: -10800 # has been broken for 3 weeks, just now causing observable DLQ fill
        magnitude: 4.8
        propagation_direction: upstream

  upstream:
    - name: event-bus-service
      description: >
        The notification event producer — publishes notification_requested events to SQS
        when users trigger emails, SMS, or push notifications. Sending ~800 messages/min.
        Completely healthy.
      correlation: independent
    - name: api-service
      description: "Main API — triggers notification events for user actions. Healthy."
      correlation: independent

  downstream:
    - name: sendgrid-smtp
      description: "SendGrid SMTP relay for email delivery. External. Healthy, 200ms p99."
      correlation: independent
    - name: twilio-sms
      description: "Twilio SMS API. External. 45-180s for delivery confirmation. Healthy."
      correlation: independent
    - name: firebase-push
      description: "Firebase Cloud Messaging for push notifications. External. 800ms p99."
      correlation: independent

personas:
  - id: diana-walsh
    display_name: "Diana Walsh"
    job_title: "Senior Software Engineer"
    team: "Notifications"
    avatar_color: "#7C3AED"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Diana Walsh, Senior SWE on the Notifications team. You own notification-service.
      You're being paged for the DLQ filling and workers OOM-killing.

      You know about the memory leak — v3.1.0 introduced it in the email template renderer.
      You were planning to fix it this week but didn't think it was urgent.

      You do NOT know about the visibility timeout misconfiguration until the trainee
      surfaces it or you think about it.

      If the trainee asks about the DLQ filling after the rollback:
      "Wait... the DLQ is still growing even after rolling back? That shouldn't happen.
      After rollback the workers are stable — they're not restarting anymore. Something
      else must be causing messages to get requeued."

      If pushed further: "The only reason a message would get requeued is... wait.
      If the visibility timeout is shorter than our processing time, SQS would make the
      message visible again before we finish. Let me check what we have the timeout set to."
      Then: "Oh no. It's 30 seconds. Our SMS messages take up to 3 minutes to process
      with retries. This has been wrong for 3 weeks. Every SMS notification has been
      sending twice for 3 weeks."

      If asked about fixing the visibility timeout: "We need to set it to at least 300 seconds —
      probably 600 to be safe with Twilio retries. It's an infra config change, not a code change."

      Keep responses 2-4 sentences. Stressed but focused tone.

  - id: raj-patel
    display_name: "Raj Patel"
    job_title: "Infrastructure Engineer"
    team: "Platform"
    avatar_color: "#059669"
    initiates_contact: false
    cooldown_seconds: 120
    silent_until_contacted: true
    system_prompt: |
      You are Raj Patel, Infrastructure Engineer on Platform. You manage SQS configurations.

      You made the visibility timeout change 3 weeks ago in IaC PR #7834 "sqs: reduce
      visibility timeout for faster DLQ promotion". Your reasoning was: "If a message fails,
      you want it in the DLQ quickly so you can inspect it. 30 seconds seemed reasonable."

      You did not know that notification processing can take up to 3 minutes.

      If contacted about the visibility timeout:
      "I changed it from 300s to 30s three weeks ago in IaC PR #7834. The thinking was
      faster DLQ promotion. I didn't check the actual processing time for different
      notification types — I assumed they were all fast like email (< 5s)."

      If asked about the fix: "Change it back to 300s minimum. If SMS messages can take
      180s with retries, I'd go to 600s. It's a Terraform variable, I can apply the
      change in 2 minutes."

      Keep responses concise. Slightly defensive at first, cooperative once confronted.

  - id: ops-monitor-bot
    display_name: "NotificationOpsBot"
    job_title: "Automation"
    team: "Operations"
    avatar_color: "#EF4444"
    initiates_contact: true
    cooldown_seconds: 120
    silent_until_contacted: false
    system_prompt: |
      You are NotificationOpsBot, an automated monitoring bot. Post periodic queue metrics.
      At T+0: "notifications-queue depth: 4,847. DLQ depth: 312 (+47 in last 5min). Worker
      restarts (last hour): 6. Duplicate delivery rate (last hour): 23%."
      At T+300: "notifications-queue depth: 7,243. DLQ depth: 891 (+116 in last 5min). Worker
      restarts (last hour): 8. Duplicate delivery rate (last hour): 31%."
      At T+600: "POST-ROLLBACK: notifications-queue depth: 3,102 (decreasing ✓). DLQ depth:
      1,247 (+71 in last 5min — still growing ⚠). Worker restarts (last hour): 1 (improving ✓).
      Duplicate delivery rate (last hour): 28% (unchanged ⚠)."
      At T+900: "POST-ROLLBACK: notifications-queue depth: 1,891 (decreasing ✓). DLQ depth:
      1,489 (+81 in last 5min — STILL GROWING ⚠⚠). Duplicate notifications customer complaints: 14."

email:
  - id: email-001
    at_second: 0
    thread_id: thread-notif-incident
    from: diana-walsh
    to: trainee
    subject: "[SEV2] notification-service: DLQ filling, workers OOM-killing — dual issue"
    body: |
      Hey,

      notification-service is having a bad time:

      1. Workers are OOM-killing every ~10 minutes — memory leak in v3.1.0's email
         template renderer. Worker restarts: 6 in the last hour.

      2. DLQ is filling fast — 312 messages currently, growing at ~47/5min

      3. Duplicate notification rate is 23% — customers are getting duplicate emails/SMS

      I think the OOM kills are causing the DLQ fill (messages in-flight when workers die
      become undeliverable). If we rollback to v3.0.8, the OOM kills should stop and the
      DLQ should stabilize.

      Opened NOTIF-4421. Executing rollback now unless you want to investigate first.

      — Diana

  - id: email-002
    at_second: 600
    thread_id: thread-notif-incident
    from: diana-walsh
    to: trainee
    subject: "[SEV2] notification-service: DLQ filling, workers OOM-killing — dual issue"
    body: |
      Update: Rolled back to v3.0.8. Workers are stable — no OOM kills in the last 8 minutes.
      Queue depth is decreasing (good!).

      BUT: DLQ is STILL growing. 1,247 messages now, was 891 at rollback time.

      I thought the DLQ fill was caused by the OOM kills. But workers are healthy now and
      the DLQ is still climbing at +71/5min. That doesn't make sense to me.

      I need help figuring out why messages are still going to the DLQ after the rollback.
      And the duplicate notification rate is unchanged at 28% — customers are still getting
      double-notified.

      — Diana

  - id: email-003
    at_second: 900
    thread_id: thread-notif-incident
    from: diana-walsh
    to: trainee
    subject: "[SEV2] notification-service: DLQ filling, workers OOM-killing — dual issue"
    body: |
      Getting customer escalations. 14 customers have complained about duplicate SMS messages.

      The queue is draining (main queue improving) but DLQ is now at 1,489 and still growing.

      I've been looking at the SQS metrics and something weird: messages are being received
      by multiple workers. The 'ApproximateNumberOfMessagesNotVisible' count is very high
      even when worker count is stable. That would only happen if... messages are becoming
      visible again while being processed?

      What's our SQS visibility timeout set to?

      — Diana

