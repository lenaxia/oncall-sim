wiki:
  pages:
    - title: "notification-service Runbook"
      content: |
        # notification-service Runbook

        ## Overview

        notification-service is an SQS consumer that dispatches email (SendGrid),
        SMS (Twilio), and push (Firebase) notifications.

        **Queue:** `notifications-queue` (standard SQS queue)
        **DLQ:** `notifications-dlq` (maxReceiveCount=3)
        **Workers:** 4 Celery workers per ECS task, 4 ECS tasks

        ## Critical Config Values

        | Variable | Value | Notes |
        |---|---|---|
        | `SQS_VISIBILITY_TIMEOUT` | **Must be ≥ max processing time** | See processing times below |
        | `WORKER_COUNT` | 4 | Workers per ECS task |
        | `MEMORY_LIMIT_MB` | 2048 | ECS task memory limit |
        | `MAX_RECEIVE_COUNT` | 3 | DLQ promotion after 3 failures |

        ## Processing Times by Notification Type

        | Type | Typical | P99 | With retries |
        |---|---|---|---|
        | Email (SendGrid) | 200ms | 4s | 15s |
        | Push (Firebase) | 800ms | 3s | 10s |
        | SMS (Twilio) | 2s | 45s | **180s** |

        ⚠️ **Visibility timeout must be ≥ 180s to handle Twilio retries.**
        Current recommended value: **300 seconds minimum, 600 seconds preferred.**

        ## DLQ Investigation

        If the DLQ is filling:
        1. Check message receive count distribution — high counts indicate requeuing
        2. Check SQS `ApproximateNumberOfMessagesNotVisible` — high value with stable
           worker count = messages becoming visible before processing completes
        3. Compare visibility timeout vs actual processing time in logs
        4. Check for worker OOM kills — restarting workers release in-flight messages

        ## Memory Leak (v3.1.0)

        v3.1.0 introduced a memory leak in the Jinja2 template renderer.
        **Status: fixed in v3.1.1 (pending) or rollback to v3.0.8.**

        Symptoms: worker RSS grows at ~180MB/minute, OOM kill every 8-12 minutes.

    - title: "SQS Visibility Timeout Guide"
      content: |
        # SQS Visibility Timeout: What It Is and Why It Matters

        ## Definition

        When a consumer receives an SQS message, SQS hides it from other consumers
        for the **visibility timeout** duration. If the message is not deleted before
        the timeout expires, SQS makes it visible again — allowing another consumer
        (or the same one) to receive it again.

        ## Consequences of Wrong Visibility Timeout

        ### Too Short (< max processing time)

        - Message becomes visible before original consumer finishes
        - Second consumer picks it up → **duplicate processing**
        - If both consumers delete at the end → race condition, one fails
        - If processing is idempotent: annoying but harmless
        - If processing is NOT idempotent (sending SMS): **duplicate notifications**
        - Increases receive count → eventually hits maxReceiveCount → **DLQ promotion**

        ### Too Long

        - Failed messages take longer to appear in DLQ for inspection
        - Slows down recovery after a consumer crash

        ## Recommended Setting

        `visibility_timeout = max_processing_time × 6`

        For notification-service (Twilio SMS p99=180s):
        → `visibility_timeout = 180s × 6 = 1080s` (18 minutes)
        → Conservative safe value: **300-600 seconds**

        ## Diagnosing Visibility Timeout Issues

        Look for these log patterns:
        - `"visibility timeout expired"` appearing before `"processing complete"`
        - `"MessageNotInflight"` errors on SQS delete
        - `"Duplicate message received"` at the start of processing
        - High `ApproximateNumberOfMessagesNotVisible` with stable consumer count

