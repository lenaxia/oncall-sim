remediation_actions:
  - id: rollback_v3_0_8
    type: rollback
    service: notification-service
    is_correct_fix: true
    target_version: v3.0.8
    label: "Rollback notification-service to v3.0.8"
    side_effect: >
      Memory leak fixed — workers stabilize, no more OOM kills. Queue depth begins
      decreasing as workers process backlog. BUT: DLQ continues growing at +71/5min.
      Duplicate delivery rate remains at 28%. The visibility timeout issue is
      independent and was pre-existing. This is only HALF the fix.

  - id: fix_visibility_timeout
    type: emergency_deploy
    service: notification-service
    is_correct_fix: true
    label: "Fix SQS visibility timeout: 30s → 600s (Terraform apply)"
    side_effect: >
      Visibility timeout changed to 600s. Messages are no longer requeued mid-processing.
      Duplicate delivery stops immediately. DLQ growth halts within 2 minutes.
      Existing DLQ messages still need to be manually reprocessed (they are not
      automatically retried once in DLQ). Customer duplicate SMS issue resolved.

  - id: scale_workers
    type: scale_cluster
    service: notification-service
    is_correct_fix: false
    label: "Scale notification workers to 8 ECS tasks"
    side_effect: >
      16 more workers added (8 tasks × 4 workers = 32 total). Queue depth decreases
      faster. But: more workers hit the same SQS message simultaneously (more consumers
      on the same queue with 30s visibility timeout). Duplicate delivery rate INCREASES
      from 28% to 41%. DLQ growth rate increases. Scaling made the visibility timeout
      problem significantly worse.

  - id: purge_dlq
    type: emergency_deploy
    service: notification-service
    is_correct_fix: false
    label: "Purge the DLQ"
    side_effect: >
      DLQ purged — 1,489 messages deleted. DLQ depth drops to 0. However: these were
      real notification messages that failed. Affected users will never receive their
      notifications. And DLQ starts filling again within 5 minutes (visibility timeout
      still wrong). You've lost real user data and the underlying problem is unchanged.

  - id: increase_max_receive_count
    type: emergency_deploy
    service: notification-service
    is_correct_fix: false
    label: "Increase maxReceiveCount from 3 to 10"
    side_effect: >
      Messages now go to DLQ after 10 receive attempts instead of 3. DLQ growth rate
      slows by ~60% (messages take longer to be promoted). But: each message is now
      potentially processed and delivered up to 10 times before DLQ promotion.
      Customer duplicate complaints will significantly increase. Does not fix the
      underlying visibility timeout problem.

evaluation:
  root_cause: >
    Two independent failures with overlapping symptoms: (1) notification-service v3.1.0
    introduced a Jinja2 template memory leak causing worker OOM-kills every 8-12 minutes.
    This caused in-flight messages to be released back to the queue. (2) Separately, an
    infrastructure change 3 weeks ago (IaC PR #7834) set the SQS visibility timeout from
    300s to 30s. Since Twilio SMS processing takes up to 180 seconds, every SMS message
    was being requeued mid-processing, causing duplicate deliveries and DLQ accumulation
    that was independent of and predated the memory leak. Both issues needed to be fixed
    independently: rollback v3.1.0 (or fix the memory leak), AND restore the visibility
    timeout to ≥300s. Fixing only the memory leak produces a deceptive partial recovery.

  relevant_actions:
    - action: search_logs
      why: >
        Logs reveal both root causes: Jinja2 environment leak ('instance=<jinja2.Environment
        object> — NOT released'), worker OOM kills, visibility timeout expiry warnings
        ('visibility timeout expired (30s) for msg_id=notif-{n}'), and the critical config
        line 'SQS_VISIBILITY_TIMEOUT=30'. The processing time mismatch is explicit in
        'estimated_duration=45-180s (visibility_timeout=30s — MISMATCH)'.
    - action: read_wiki_page
      why: >
        'SQS Visibility Timeout Guide' explains why short timeouts cause duplicate delivery
        and DLQ fill. 'notification-service Runbook' documents the memory leak and the
        critical note that visibility timeout must be ≥180s for Twilio SMS retries.
    - action: view_deployment_history
      why: >
        Shows v3.1.0 deployed 4h ago with 'redesign email template renderer'. Also shows
        infra config pipeline for SQS — but only if the trainee looks at infrastructure
        deployments, not just service deployments.
    - action: direct_message_persona
      why: >
        Contacting Diana Walsh after partial recovery surfaces her realization about the
        visibility timeout. Contacting Raj Patel confirms the IaC PR #7834 change and
        enables the Terraform apply fix.
    - action: trigger_rollback
      why: "Rollback to v3.0.8 fixes the memory leak (first root cause). Necessary but not sufficient."
      service: notification-service
      remediation_action_id: rollback_v3_0_8
    - action: emergency_deploy
      why: "Terraform apply to set visibility timeout to 600s fixes the second root cause."
      service: notification-service
      remediation_action_id: fix_visibility_timeout
    - action: mark_resolved
      why: "Only valid after BOTH fixes are applied — rollback + visibility timeout fix."

  red_herrings:
    - action: scale_cluster
      why: "More workers increases duplicate delivery rate — more consumers competing for the same SQS message with a 30s visibility window."
    - action: emergency_deploy
      why: "Purging the DLQ destroys real notification data. DLQ fills again within 5 minutes."
      remediation_action_id: purge_dlq
    - action: emergency_deploy
      why: "Increasing maxReceiveCount delays DLQ fill but dramatically increases duplicate delivery rate."
      remediation_action_id: increase_max_receive_count
    - action: mark_resolved
      why: "Declaring resolved after only the rollback is a critical mistake — the DLQ will continue to grow and duplicates continue."

  debrief_context: |
    This scenario tests the ability to maintain investigation focus after a partial fix
    produces misleading positive signals. The rollback "works" — workers stabilize, queue
    depth decreases — which creates enormous psychological pressure to declare victory.

    The trap: the DLQ was already filling before the memory leak manifested significantly.
    The visibility timeout misconfiguration was the silent primary driver of the DLQ fill
    for 3 weeks. The memory leak made it dramatically worse but was not the sole cause.

    Key diagnostic signals that should have prompted suspicion:
    1. Duplicate delivery rate was 23% at T+0 (not a normal value for healthy queue processing)
    2. Post-rollback, DLQ continued growing despite worker stability
    3. Logs showed 'visibility timeout expired (30s)' for messages that clearly take >30s
    4. 'SQS_VISIBILITY_TIMEOUT=30' in config dump is the smoking gun

    The partial fix trap: engineers naturally anchor on the first identified root cause
    (memory leak) and stop investigating when it's fixed. Real incidents often have
    multiple contributing factors. If the metrics don't fully recover after a fix,
    the investigation is not complete.

    Post-incident:
    - Memory leak: add long-running memory tests to CI (>15 minutes)
    - Visibility timeout: add validation that SQS_VISIBILITY_TIMEOUT ≥ max processing time
    - IaC changes to queue config should require review from the owning team
