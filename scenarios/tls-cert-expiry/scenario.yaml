remediation_actions:
  - id: emergency_deploy_cert
    type: emergency_deploy
    service: api-platform
    is_correct_fix: true
    target_version: v5.1.2-cert
    label: "Update API Gateway TLS cert (ACM arn:...abc-123)"
    side_effect: "API Gateway updated to use replacement cert. TLS handshakes succeed. Fault rate drops to 0% within 30 seconds."

  - id: rollback_api
    type: rollback
    service: api-platform
    is_correct_fix: false
    target_version: v5.1.1
    side_effect: "Rolling back doesn't help — the certificate is managed separately from the service code. Fault rate unchanged."

  - id: restart_api
    type: restart_service
    service: api-platform
    is_correct_fix: false
    side_effect: "Restarting ECS tasks doesn't affect the API Gateway TLS certificate. Fault rate unchanged."

evaluation:
  root_cause: >
    The TLS certificate for api.acme.io expired at midnight. The cert_expiry alarm
    was silenced 6 months ago after false positives and never reconfigured — no
    advance warning was generated. Fix: emergency deploy to update API Gateway
    custom domain binding to the replacement certificate already available in ACM.

  relevant_actions:
    - action: search_logs
      why: "Logs immediately show CERTIFICATE_EXPIRED TLS errors — confirms the root cause without investigation."
    - action: read_wiki_page
      why: "API Platform Runbook documents the exact emergency cert renewal procedure including the aws CLI command."
    - action: emergency_deploy
      why: "Emergency deploy updates API Gateway to use the replacement cert from ACM."
      service: api-platform
      remediation_action_id: emergency_deploy_cert
    - action: monitor_recovery
      why: "Fault rate should drop to 0% within 30 seconds of the cert update."
    - action: update_ticket
      why: "Communicating to partners and updating the ticket is expected for a SEV1 full outage."

  red_herrings:
    - action: trigger_rollback
      why: "Certificate is managed independently of service code. Rolling back changes nothing."
    - action: restart_service
      why: "Restarting ECS tasks doesn't affect API Gateway TLS configuration. Fault rate stays at 100%."
    - action: suppress_alarm
      why: "Silencing the fault_rate alarm (already an anti-pattern that caused this incident) makes the situation worse."

  debrief_context: |
    This is an easy scenario by design — the root cause is obvious from logs and
    the fix is a single action. The learning is about:

    1. **Alarm hygiene**: the cert_expiry alarm was silenced instead of fixed, which
       is why no advance warning came. This is a policy violation documented in the wiki.

    2. **Certificate management**: knowing that certs are separate from service code
       (rolling back code won't help) and that ACM provides the replacement mechanism.

    3. **Speed**: this is a full outage (100% fault rate). There's nothing to investigate —
       the logs are unambiguous. Act immediately, communicate, then document.

    Common mistakes: (1) rolling back the service code (wrong layer), (2) spending
    time investigating the ECS or DB (both healthy), (3) not reading the wiki
    which has the exact CLI command for the fix.
