    auto_page: true
    page_message: "recommendation-service p99 latency exceeded 2s. DB may be overloaded."
  - id: alarm-db-pool
    service: recommendation-service
    metric_id: connection_pool_used
    condition: "DB connection pool > 120 connections"
    severity: SEV2
    threshold: 120
    auto_fire: true
    auto_page: false

