wiki:
  pages:
    - title: "recommendation-service Runbook"
      content: |
        # recommendation-service Runbook

        ## Architecture

        recommendation-service caches all recommendation sets in Elasticache Redis.
        - Cache TTL: 3600 seconds (1 hour)
        - Typical cache hit rate: 80-85%
        - On cache miss: 3 DB queries to recommendations-db (Aurora)

        ## Cache Stampede Recovery

        If Elasticache is restarted or cache is cold:

        1. **Identify**: cache_hit_rate drops sharply, DB connections spike
        2. **Immediate**: scale ECS to handle increased DB load (buys time)
        3. **Warm cache**: run `warm_recommendations_cache.sh`
           - Pre-populates top 10k recommendation sets
           - Runtime: ~8 minutes
           - Path: `/ops/scripts/warm_recommendations_cache.sh`
        4. **Monitor**: cache_hit_rate should recover to 80%+ within 15-20 minutes

        ## Elasticache Maintenance

        Elasticache clusters should be patched with rolling restarts (one node at a time).
        Both nodes restarting simultaneously wipes the cache entirely.

        **Contact**: @brendan-walsh (Infrastructure) for maintenance coordination.

    - title: "Cache Warming"
      content: |
        # Cache Warming Script

        `warm_recommendations_cache.sh` pre-populates the top 10,000 recommendation
        sets from the recommendations-db into Elasticache.

        ## When to use

        - After any Elasticache cluster restart or flush
        - After recovering from a cache stampede
        - After scaling up (new nodes start cold)

        ## Usage

        ```bash
        # Run from any ECS task via ECS Exec
        /ops/scripts/warm_recommendations_cache.sh --env prod --top-n 10000
        ```

        Runtime: ~8 minutes. Monitor cache_hit_rate in CloudWatch.

