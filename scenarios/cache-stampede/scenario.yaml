ticketing:
  - id: REC-209
    title: "recommendation-service: cache stampede — Elasticache cold after maintenance"
    severity: SEV2
    status: open
    description: |
      ## Summary

      recommendation-service degraded. RDS Aurora connection pool saturating.
      Root cause: Elasticache cluster restarted simultaneously (not rolling) during
      OS patching at 2:30am — cache wiped cold. 82% of reads now hitting DB directly.

      ## Symptoms

      - p99 latency: > 8s (baseline ~120ms)
      - Error rate: ~15% (DB timeouts)
      - cache_hit_rate: ~2% (baseline 82%)
      - RDS connections: maxed out
      - CPU on Elasticache: minimal (confirming cold cache — no hits to process)

      ## Root Cause

      Both Elasticache nodes restarted simultaneously due to patching tool coordination
      bug. Cache empty. Stampede of DB reads from all cache misses.

      ## Resolution

      1. Run cache warming script (warm_recommendations_cache.sh) — 8 min
      2. Cache auto-populates from traffic as TTLs fill in — 15-20 min total
      3. Scale RDS to handle load until cache recovers (optional)

    created_by: yuki-tanaka
    assignee: trainee
    at_second: -300

