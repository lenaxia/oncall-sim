remediation_actions:
  - id: scale_recs_cluster
    type: scale_cluster
    service: recommendation-service
    is_correct_fix: false
    label: "Scale ECS to 12 instances"
    side_effect: "Reduces individual instance load but doesn't fix the cache stampede. DB still overloaded — each new instance generates more cache-miss queries. Buys time for cache to warm but doesn't fix it."

  - id: rollback_recs
    type: rollback
    service: recommendation-service
    is_correct_fix: false
    target_version: v6.3.0
    side_effect: "Last deploy was 6 days ago and unrelated. Rolling back doesn't restore the cache — it's empty regardless of code version. DB stays overloaded."

  - id: restart_recs
    type: restart_service
    service: recommendation-service
    is_correct_fix: false
    side_effect: "Restarting ECS tasks clears their local state but doesn't warm the cache. Each restarted instance immediately starts generating cache-miss queries again."

evaluation:
  root_cause: >
    The Elasticache cluster (recommendations-cache) was patched at 2:30am. A bug in
    the patching tool caused both nodes to restart simultaneously instead of rolling,
    wiping the entire cache. When morning traffic arrived, cache_hit_rate dropped from
    82% to ~2%, flooding the RDS Aurora database with 615+ extra queries/second.
    RDS connection pool saturated, p99 latency spiked, error rate climbed.
    Fix: run the cache warming script and allow natural TTL repopulation.

  relevant_actions:
    - action: search_logs
      why: "Logs show 98% cache miss rate and Elasticache node uptime of ~1842s — recently restarted, explains cold cache."
    - action: read_wiki_page
      why: "Runbook documents cache stampede recovery procedure including the warming script."
    - action: direct_message_persona
      why: "Paging @brendan-walsh confirms the simultaneous restart — validates the root cause hypothesis."
    - action: scale_cluster
      why: "Scaling ECS buys time for the cache to warm by reducing per-instance pressure."
      service: recommendation-service
      remediation_action_id: scale_recs_cluster
    - action: monitor_recovery
      why: "cache_hit_rate should climb back to 80%+ within 15-20 minutes of running the warming script."

  red_herrings:
    - action: trigger_rollback
      why: "The last deploy was 6 days ago — temporal correlation is absent. Cache stampede is not a code issue."
    - action: restart_service
      why: "Restarting ECS doesn't warm the cache — each restarted instance immediately starts generating misses again."

  debrief_context: |
    This is the hardest scenario in the library because the root cause requires
    connecting two observations: (1) cache_hit_rate has collapsed, and (2) DB is
    saturated — and recognising that (2) is caused by (1), not an independent DB problem.

    The trap: the DB connection pool alarm fires first, and it LOOKS like a DB problem.
    Trainees who anchor on the DB will waste time investigating RDS, potentially scaling
    the DB (which helps only marginally). The insight: if cache_hit_rate is 2%, you're
    sending 82% × 250 RPS = 205 extra requests/second to the DB. That's why it's
    saturated — fix the cache, not the DB.

    Also tests: knowing to page infrastructure when you suspect an infra change, and
    knowing about the cache warming script (documented in the runbook).
