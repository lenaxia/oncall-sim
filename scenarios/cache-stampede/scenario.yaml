id: cache-stampede
title: "Recommendation Service: Cache Stampede After Cluster Restart"
description: >
  The recommendation service is degrading hard. p99 latency spiked and
  error rate is climbing. Infra applied a patch to the Elasticache cluster
  overnight. Something didn't go as planned.
difficulty: hard
tags: [cache, elasticache, stampede, rds, cold-start, recommendations]

timeline:
  default_speed: 2
  duration_minutes: 20
  pre_incident_seconds: 28800
  resolution_seconds: 180

topology:
  focal_service:
    name: recommendation-service
    description: "Personalised product recommendation service. Elasticache-backed — cache normally handles 82% of reads."
    owner: yuki-tanaka
    typical_rps: 250
    traffic_profile: business_hours_web
    health: degraded
    components:
      - id: alb
        type: load_balancer
        label: "ALB"
        inputs: []
      - id: ecs
        type: ecs_cluster
        label: "recommendation-service ECS"
        instance_count: 6
        utilization: 0.55
        inputs: [alb]
      - id: cache
        type: elasticache
        label: "recommendations-cache (Elasticache Redis)"
        instance_count: 2
        utilization: 0.15 # CPU low — cache is lightly loaded
        inputs: [ecs]
      - id: recs_db
        type: rds
        label: "recommendations-db (RDS Aurora)"
        instance_count: 1
        max_connections: 150
        utilization: 0.30
        connection_utilization: 0.20
        inputs: [ecs]
    incidents:
      - id: cache_miss_spike
        affected_component: cache
        description: "Elasticache cluster restarted for OS patching at 2am — cache is cold. cache_hit_rate drops from 82% to ~2% as all requests miss and hit the DB."
        onset_overlay: sudden_drop
        onset_second: 90
        magnitude: 0.02
      - id: db_saturation
        affected_component: recs_db
        description: "RDS Aurora connection pool saturated by stampeding cache-miss reads — 250 RPS × 0.82 cache miss rate × 3 DB queries per recommendation = ~615 extra queries/second."
        onset_overlay: saturation
        onset_second: 90
        magnitude: 1.0
  upstream:
    - name: storefront
      description: "Storefront calls recommendation-service for personalised product lists."
  downstream:
    - name: recommendations-db
      description: "Aurora PostgreSQL with user behaviour data."
      correlation: upstream_impact

engine:
  tick_interval_seconds: 15
  default_tab: email
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 2

personas:
  - id: yuki-tanaka
    display_name: "Yuki Tanaka"
    job_title: "Staff Software Engineer"
    team: "Recommendations"
    avatar_color: "#F97316"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Yuki Tanaka, Staff SWE on the Recommendations team. You own
      recommendation-service. You're confused — there's no recent code deploy
      and the DB is clearly being hammered, but you don't know why.

      You don't know about the Elasticache maintenance window yet. You suspect
      something changed in infra overnight but haven't confirmed.

      If the trainee identifies the cache_hit_rate drop or asks about infra changes:
      confirm you can see cache misses in the logs and you suspect something happened
      to the cache cluster.

      If asked directly about the fix: "If the cache is cold, we have a cache warming
      script — warm_recommendations_cache.sh. It pre-populates the top 10k recommendation
      sets. Takes about 8 minutes to run. That plus the cache auto-populating from
      traffic should get us back to normal in ~15 minutes."

      1-3 sentences. Collaborative but stressed.

  - id: brendan-walsh
    display_name: "Brendan Walsh"
    job_title: "Infrastructure Engineer"
    team: "Infrastructure"
    avatar_color: "#84CC16"
    initiates_contact: false
    cooldown_seconds: 120
    silent_until_contacted: true
    system_prompt: |
      You are Brendan Walsh, Infrastructure Engineer. You applied an OS security
      patch to the Elasticache cluster (recommendations-cache) at 2:30am. Maintenance
      windows are usually no-impact because Elasticache does a rolling restart. However
      last night both nodes restarted simultaneously due to a coordination bug in the
      patching tool — wiping the cache entirely.

      If contacted and asked about the Elasticache cluster:
      "Yeah, I patched recommendations-cache at 2:30am. Should have been rolling but
      both nodes restarted at the same time — coordination bug in the patching tool.
      Cache is completely cold. Really sorry about that."

      Be direct and apologetic.

