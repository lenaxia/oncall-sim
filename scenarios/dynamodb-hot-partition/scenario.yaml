    - id: chat-005
      at_second: 360
      channel: "#catalog-eng"
      persona: tom-bradley
      text: "Confirmed hot partition. products-table partition 'product#FLASH-SALE-2024-HOODIE' is at ~1000 WCU/s — the per-partition hard cap. This is a write distribution problem, not a capacity problem."
    - id: chat-006
      at_second: 420
      channel: "#catalog-eng"
      persona: tom-bradley
      text: "Capacity increase will NOT help here. The partition cap is enforced by DynamoDB regardless of table-level mode. Need write sharding or DAX."
    - id: chat-007
      at_second: 600
      channel: "#incidents"
      persona: anya-kozlov
      text: "Aware of the issue. The ADR that disabled DynamoDB capacity alarms didn't account for hot partition scenarios — that's a gap we'll need to address post-incident. But the alarm change isn't what caused this."

ticketing:
  - id: PROD-8847
    title: "product-catalog-service: DynamoDB ProvisionedThroughputExceededException on on-demand table"
    severity: SEV2
    status: open
    description: |
      ## Summary

      product-catalog-service is experiencing DynamoDB write errors (ProvisionedThroughputExceededException)
      despite the products-table being configured for on-demand billing mode.

      ## Symptoms

      - DynamoDB write error rate: **23%** (baseline: <0.1%)
      - ECS error rate: **18%** (baseline: <0.5%)
      - Affected: all inventory write operations (price updates, stock updates, view counters)
      - Table-level WCU: ~4,200/s — well within on-demand capacity
      - **One partition is absorbing ~96% of all writes** (product#FLASH-SALE-2024-HOODIE)

      ## Timeline

      - T-4:00h — v4.2.0 deployed ("trending badge" feature)
      - T-3:00h — Flash sale began (SUMMER-FLASH-SALE campaign)
      - T+0:00 — DynamoDB write errors begin, ECS errors follow
      - T+0:05 — PagerDuty fires, this ticket opened

      ## Context

      - Table: `products-table` (us-east-1)
      - Billing mode: ON_DEMAND (migrated 6 months ago per ADR-2024-07)
      - **Capacity alarms: DISABLED** per ADR-2024-07 ("on-demand auto-scales, alarms unnecessary")

      ## Hypotheses

      1. Bug in retry logic amplifying the problem (SDK retries hitting the same partition)
      2. Hot partition due to viral product + trending badge (write concentration)
      3. SDK version mismatch causing incorrect error classification

    created_by: priya-mehta
    assignee: trainee
    at_second: -60

  - id: PROD-8849
    title: "FLASH-SALE-2024-HOODIE: Inventory count may be stale — write failures affecting stock accuracy"
    severity: SEV3
    status: open
    description: |
      ## Summary

      Due to DynamoDB write failures on product-catalog-service, inventory count for
      FLASH-SALE-2024-HOODIE may not accurately reflect actual sales. Risk of overselling.

      ## Customer Impact

      - Customers may see incorrect stock count (showing available when sold out, or vice versa)
      - Orders placed against stale inventory will be auto-cancelled at fulfilment
      - Estimated stale window: ~T+0 to current time

    created_by: flash-sale-bot
    assignee: trainee
    at_second: 300

alarms:
  - id: alarm-dynamo-write-throttle
    service: product-catalog-service
    metric_id: write_throttles
    condition: "write_throttles > 50/min for 5 consecutive minutes"
    severity: SEV2
    auto_fire: true
    auto_page: true
    onset_second: -10800
    page_message: "product-catalog-service: DynamoDB write throttles exceeding threshold. On-demand table — investigate hot partition."
  - id: alarm-ecs-error-rate
    service: product-catalog-service
    metric_id: error_rate
    condition: "error_rate > 10%"
    severity: SEV2
    auto_fire: true
    auto_page: false
    onset_second: -10680
  - id: alarm-dynamo-read-capacity
    service: product-catalog-service
    metric_id: read_capacity_used
    condition: "read_capacity_used > 80%"
    severity: SEV3
    auto_fire: false # DISABLED per ADR-2024-07 — on-demand tables auto-scale
    auto_page: false
    page_message: "NOTE: This alarm is intentionally disabled per ADR-2024-07. On-demand tables auto-scale. If this fires, investigate hot partition."
  - id: alarm-dynamo-write-capacity
    service: product-catalog-service
    metric_id: write_capacity_used
    condition: "write_capacity_used > 80%"
    severity: SEV3
    auto_fire: false # DISABLED per ADR-2024-07 — on-demand tables auto-scale
    auto_page: false

