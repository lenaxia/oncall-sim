wiki:
  pages:
    - title: "product-catalog-service Runbook"
      content: |
        # product-catalog-service Runbook

        ## Overview

        product-catalog-service is the authoritative source for product data, inventory
        counts, and pricing. It uses DynamoDB `products-table` as its primary store.

        **DynamoDB table:** `products-table` (on-demand billing mode)
        **Table region:** us-east-1

        ## DynamoDB Billing Mode

        The products-table was migrated to on-demand billing in June 2024 (ADR-2024-07).
        **Capacity alarms are disabled** — on-demand auto-scales, so capacity alarms
        would only generate false positives.

        ## Common Incidents

        ### Write Throttles on On-Demand Table

        **This should not happen under normal circumstances.** If you see
        ProvisionedThroughputExceededException on an on-demand table:

        1. **Check table-level throughput** — if total WCU is within reasonable bounds,
           the issue is NOT total capacity
        2. **Check for hot partitions** — DynamoDB partitions are capped at **1000 WCU/s**
           regardless of table billing mode. A single item receiving concentrated writes
           will hit this cap.
        3. **Identify the hot key** — search logs for repeated writes to the same partition
           key prefix

        **What does NOT fix a hot partition:**
        - Requesting a quota increase from AWS (they will say no — per-partition cap is fundamental)
        - Switching back to provisioned capacity (same partition cap applies)
        - Scaling the application tier (more app servers generate more writes to same partition)

        **What fixes a hot partition:**
        - **Write sharding** — prepend a random 0-9 prefix to the partition key
          (e.g. `3#product#FLASH-SALE-2024-HOODIE`) to distribute across 10 partitions
        - **DAX** — reduces read pressure but does NOT help write-heavy hot partitions
        - **Short-term:** throttle write traffic to the affected product until a structural
          fix can be deployed

        ### High ECS Error Rate

        If DynamoDB write errors bubble up to the ECS service:
        1. Confirm DynamoDB is the root cause (check logs for DynamoDBException)
        2. Do NOT restart ECS — the restarts will immediately retry and re-hit the hot partition
        3. Fix the DynamoDB issue first

    - title: "ADR-2024-07: DynamoDB On-Demand Migration"
      content: |
        # ADR-2024-07: Migrate products-table to DynamoDB On-Demand Billing

        **Status:** Accepted
        **Date:** 2024-06-15
        **Authors:** Tom Bradley, Anya Kozlov

        ## Decision

        Migrate `products-table` from provisioned capacity (2000 RCU / 2000 WCU) to
        on-demand billing mode.

        ## Rationale

        1. Flash sales and seasonal events cause unpredictable traffic spikes that
           are difficult to capacity-plan for
        2. On-demand auto-scales to accommodate any throughput level
        3. Capacity alarms are no longer meaningful — we will disable them to reduce
           alert noise

        ## Consequences

        **Positive:**
        - No more capacity planning for provisioned throughput
        - No more ProvisionedThroughputExceededException under normal load
        - Reduced operational overhead

        **Negative / Risks:**
        - Hot partition scenarios are NOT protected by on-demand mode — individual
          partitions are still capped at 1000 WCU/s (DynamoDB fundamental)
        - **This scenario was not considered in this ADR** ← gap identified post-incident

        ## Alarms Disabled

        The following alarms were disabled as part of this migration:
        - `dynamo-read-capacity-alarm` (products-table)
        - `dynamo-write-capacity-alarm` (products-table)

    - title: "DynamoDB Hot Partition Recovery Guide"
      content: |
        # DynamoDB Hot Partition Recovery Guide

        ## What Is a Hot Partition?

        DynamoDB splits data across internal partitions based on the partition key hash.
        Each partition has a hard throughput cap of **~1000 WCU/s and ~3000 RCU/s**,
        regardless of whether the table uses provisioned or on-demand capacity.

        When all writes concentrate on one partition key, you hit the partition cap —
        even on an on-demand table with effectively unlimited table-level capacity.

        ## How to Identify

        ```
        # CloudWatch metric to check:
        DynamoDB > ConsumedWriteCapacityUnits > Sum by PartitionKey
        # Or in application logs:
        grep "ProvisionedThroughputExceeded" | cut -d'=' -f3 | sort | uniq -c | sort -rn
        ```

        ## Recovery Options

        ### Immediate (minutes)

        1. **Throttle writes to the hot key** — add application-level rate limiting
           specifically for the hot product. Reduces WCU pressure.
        2. **Disable the feature driving concentrated writes** — if a trending badge
           or similar feature is causing write concentration, toggling it off immediately
           stops new writes from concentrating.

        ### Short-term (< 1 hour)

        3. **Emergency deploy: write sharding** — prepend a random single-digit prefix
           to the partition key. Changes `product#FLASH-SALE-2024-HOODIE` to
           `{0-9}#product#FLASH-SALE-2024-HOODIE`, distributing writes across 10 partitions.
           Read path must be updated to scatter-gather across all 10 prefixes.

        ### Medium-term (architectural)

        4. **Enable DAX** — Amazon DynamoDB Accelerator provides a read-through cache.
           Reduces read pressure substantially. Does not help write-heavy hot partitions.
        5. **Redesign partition key** — avoid keys that naturally concentrate (e.g. trending
           items, current date as key prefix, single tenant ID)

