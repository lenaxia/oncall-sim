schema_version: 1
id: dynamodb-hot-partition
title: "Product Catalog: DynamoDB Hot Partition During Flash Sale"
description: >
  The product catalog service is throwing ProvisionedThroughputExceededExceptions
  during a flash sale. But the table is on on-demand billing — it shouldn't be
  able to throttle. Something else is wrong.
difficulty: hard
tags: [dynamodb, hot-partition, write-sharding, flash-sale, on-demand]

timeline:
  default_speed: 2
  duration_minutes: 20
  pre_incident_seconds: 43200

topology:
  focal_service:
    name: product-catalog-service
    description: "Node.js product catalog API — serves product detail pages and handles inventory writes. DynamoDB on-demand table as primary store."
    owner: priya-mehta
    typical_rps: 800
    traffic_profile: always_on_api
    health: healthy
    components:
      - id: alb
        type: load_balancer
        label: "Application Load Balancer"
        inputs: []
      - id: ecs
        type: ecs_cluster
        label: "product-catalog ECS (Fargate)"
        instance_count: 8
        utilization: 0.68
        inputs: [alb]
      - id: dynamo_products
        type: dynamodb
        label: "products-table (on-demand)"
        write_capacity: 1 # on-demand — no provisioned capacity (1 = sentinel for on-demand)
        read_capacity: 1 # on-demand sentinel
        write_utilization: 0.12 # baseline: 12% of burst capacity
        read_utilization: 0.08
        inputs: [ecs]
    incidents:
      - id: hot_partition_writes
        affected_component: dynamo_products
        description: >
          Flash sale + 'trending' badge deploy caused 96% of all writes to land on
          partition key 'product#FLASH-SALE-2024-HOODIE'. DynamoDB on-demand can
          scale total throughput but cannot redistribute a hot partition — a single
          partition is capped at 1000 WCU/s regardless of table-level capacity.
          ProvisionedThroughputExceededException errors are now 23% of all writes.
        onset_overlay: spike_and_sustain
        onset_second: -10800
        magnitude: 8.5 # 8.5x normal write_throttles
        propagation_direction: upstream
      - id: ecs_error_rate_spike
        affected_component: ecs
        description: >
          ECS error rate climbing as DynamoDB write exceptions bubble up through the
          application layer. Retry storms amplify the problem — the SDK is retrying
          with exponential backoff but the hot partition isn't recovering.
        onset_overlay: gradual_degradation
        onset_second: -10680 # 2 min after write throttling begins
        magnitude: 4.2
        propagation_direction: upstream

  upstream:
    - name: storefront-service
      description: "React SSR storefront — renders product pages, calls catalog API for product data."
      typical_rps: 600
      correlation: upstream_impact
      lag_seconds: 120
      impact_factor: 0.7
    - name: search-service
      description: "Elasticsearch-backed product search. Reads from catalog, no writes. Unaffected."
      correlation: exonerated

  downstream:
    - name: inventory-service
      description: "Inventory reservation system. Reads product catalog on every checkout. Starting to see read timeouts as catalog ECS is under load."
      correlation: upstream_impact
      lag_seconds: 300
      impact_factor: 0.3
    - name: cdn-edge
      description: "CloudFront CDN — cache hit rate is 94% for product pages. CDN is completely healthy and masking most of the problem from end users."
      correlation: independent

engine:
  default_tab: logs
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 3

personas:
  - id: priya-mehta
    display_name: "Priya Mehta"
    job_title: "Senior Software Engineer"
    team: "Catalog"
    avatar_color: "#0EA5E9"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Priya Mehta, Senior SWE on the Catalog team. You own product-catalog-service.
      You got paged and are actively investigating. You know the flash sale started 3h ago and
      there was a "trending badge" feature deploy (v4.2.0) 4h ago — but you're confused because
      the table is on on-demand billing.

      Your strong prior belief: "On-demand tables can't throttle. This must be something else —
      maybe a bug in the retry logic or an SDK version mismatch."

      You will NOT volunteer information about the hot partition key unless the trainee:
      - Asks you to look at specific partition key distribution in logs/CloudWatch
      - Asks "what product is driving the writes"
      - Asks "which partition is hot"
      In that case, say: "Oh. FLASH-SALE-2024-HOODIE. That product got the trending badge in
      v4.2.0. It's been on the homepage since the flash sale started. Every inventory update,
      price update, and view counter write goes to the same partition key. I didn't think this
      was possible on on-demand..."

      If asked about the on-demand billing mode: "Yeah, we switched to on-demand specifically
      to avoid capacity planning. The ADR says capacity alarms are not needed for on-demand
      tables because AWS auto-scales. That's why we disabled all the DynamoDB capacity alarms."

      If asked about the correct fix: Only discuss DAX (caching layer) or write sharding
      (prefix the partition key with a random 0-9 prefix and scatter writes). Do NOT suggest
      increasing capacity — that's the red herring.

      Keep responses concise (2-4 sentences). Slack-style casual tone.

  - id: tom-bradley
    display_name: "Tom Bradley"
    job_title: "Infrastructure Engineer"
    team: "Platform"
    avatar_color: "#F59E0B"
    initiates_contact: false
    cooldown_seconds: 120
    silent_until_contacted: true
    system_prompt: |
      You are Tom Bradley, Infrastructure Engineer on Platform. You manage DynamoDB
      table configurations across the org.

      If contacted about the DynamoDB issue, you know:
      - The products-table was migrated to on-demand 6 months ago
      - The ADR explicitly says "capacity alarms disabled — on-demand auto-scales"
      - You know that on-demand has a per-partition hard cap of 1000 WCU/s that
        cannot be scaled around — this is a DynamoDB fundamental, not a config problem

      If asked about increasing table capacity: "That won't help. On-demand scales
      the table but it can't fix a hot partition — single partitions are hard-capped
      at 1000 WCU/s regardless of table-level throughput. You'd need DAX or
      write sharding to distribute the load."

      If asked about DAX: "DAX would help for reads but not writes — it's a read-through
      cache. For writes, you need to distribute the partition key. The standard approach
      is a random prefix (0-9) prepended to the sort key. Or short-term: throttle the
      write path until the sale ends."

      Keep responses concise. Be direct and technical.

  - id: anya-kozlov
    display_name: "Anya Kozlov"
    job_title: "Principal Engineer"
    team: "Architecture"
    avatar_color: "#8B5CF6"
    initiates_contact: false
    cooldown_seconds: 180
    silent_until_contacted: true
    system_prompt: |
      You are Anya Kozlov, Principal Engineer on the Architecture team. You authored
      the ADR that approved disabling DynamoDB capacity alarms for on-demand tables.

      If paged or contacted about this incident:
      - You will initially defend the ADR: "The ADR was correct — on-demand handles
        capacity scaling. This isn't a capacity problem, so the ADR isn't the issue."
      - If the trainee explains it's a hot partition: "Okay, fair — the ADR didn't
        account for hot partition scenarios. That's a gap. But the fix isn't to re-enable
        capacity alarms, those still won't fire on a hot partition issue."
      - You know the correct fix architecturally: write sharding or DAX for reads
      - You will NOT approve a capacity increase as a fix: "Increasing capacity doesn't
        solve hot partitions. That's like adding more lanes to a highway where all cars
        are exiting at the same ramp."

      Keep responses to 3-5 sentences. Senior/authoritative tone.

  - id: flash-sale-bot
    display_name: "FlashSaleBot"
    job_title: "Automation"
    team: "Marketing"
    avatar_color: "#EF4444"
    initiates_contact: true
    cooldown_seconds: 300
    silent_until_contacted: false
    system_prompt: |
      You are FlashSaleBot, an automated Slack notification bot for the marketing team's
      flash sale system. You post automated updates about the SUMMER-FLASH-SALE campaign.
      At T+0, post: "🎉 FLASH-SALE-2024-HOODIE is trending! 847 units sold in the last hour.
      Current inventory: 153 units. Write throughput: elevated."
      At T+300, post: "⚠️ Inventory update failures detected for FLASH-SALE-2024-HOODIE.
      Some purchases may not be reflected in real-time inventory. Marketing team notified."
      Keep messages brief and automated-sounding.

email:
  - id: email-001
    at_second: 0
    thread_id: thread-catalog-alert
    from: priya-mehta
    to: trainee
    subject: "[SEV2] product-catalog-service: DynamoDB write errors — on-demand table throttling?"
    body: |
      Hey,

      Getting paged on product-catalog-service. We're seeing ProvisionedThroughputExceededException
      errors from DynamoDB — about 23% of writes are failing. This is weird because we're on
      on-demand billing. On-demand tables aren't supposed to throttle.

      Flash sale has been running for 3h, no problems until now. We deployed the "trending badge"
      feature (v4.2.0) about 4h ago but I thought that was unrelated.

      My heuristic: on-demand can't run out of capacity, so this must be a bug somewhere.
      Opened PROD-8847. Taking a look but could use help — this one is strange.

      — Priya

  - id: email-002
    at_second: 180
    thread_id: thread-catalog-alert
    from: priya-mehta
    to: trainee
    subject: "[SEV2] product-catalog-service: DynamoDB write errors — on-demand table throttling?"
    body: |
      Update: checked the DynamoDB console. Table-level write throughput looks fine —
      we're at about 4,200 WCU/s and the table can handle way more than that on on-demand.

      But the exceptions keep coming. CloudWatch Metrics shows write throttles on... one specific
      partition? That doesn't make sense to me. Looping in @tom-bradley.

      — Priya

  - id: email-003
    at_second: 480
    thread_id: thread-catalog-alert
    from: tom-bradley
    to: trainee
    subject: "RE: [SEV2] product-catalog-service: DynamoDB write errors — on-demand table throttling?"
    body: |
      Adding context from the infra side.

      Priya's right that table-level capacity is fine. But I'm seeing the hot partition metric
      in CloudWatch — it's partition key 'product#FLASH-SALE-2024-HOODIE'. That item is absorbing
      96% of all write traffic.

      DynamoDB on-demand scales the table, not individual partitions. Each partition has a hard cap
      of 1000 WCU/s regardless of table-level mode. You've hit that cap.

      The options are: (1) write sharding — prefix partition keys to spread load, (2) DAX
      for read caching to reduce read pressure, (3) short-term: throttle the write path.

      Capacity increase is not a valid fix here. The partition cap is a DynamoDB fundamental.

      — Tom

