host_groups:
  - id: product-catalog-us-east-1
    label: "product-catalog-service (us-east-1)"
    service: product-catalog-service
    instance_count: 8
    description: "8 Fargate tasks across 3 AZs — us-east-1a, us-east-1b, us-east-1c"

feature_flags:
  - id: trending_badge_enabled
    label: "Trending Badge"
    default_on: true
    description: "Shows a 'trending' badge on hot products. Deployed in v4.2.0. Causes all write traffic for badged products to concentrate on the same partition key."
  - id: dax_enabled
    label: "DAX Read Cache"
    default_on: false
    description: "Routes read traffic through Amazon DAX. Reduces read pressure. Does NOT help write-heavy hot partitions."
  - id: write_sharding_enabled
    label: "Write Sharding (0-9 prefix)"
    default_on: false
    description: "Prepends a random 0-9 prefix to partition keys, distributing writes across 10 partitions. Requires scatter-gather reads. Emergency mitigation for hot partition scenarios."

remediation_actions:
  - id: disable_trending_badge
    type: toggle_feature_flag
    service: product-catalog-service
    is_correct_fix: true
    flag_id: trending_badge_enabled
    flag_enabled: false
    label: "Disable trending badge feature flag"
    side_effect: >
      Trending badge disabled — write traffic immediately disperses across all products.
      Hot partition pressure drops within 60 seconds. Inventory writes resume normally.
      Marketing team will be unhappy. Flash sale continues without trending indicators.

  - id: enable_write_sharding
    type: toggle_feature_flag
    service: product-catalog-service
    is_correct_fix: true
    flag_id: write_sharding_enabled
    flag_enabled: true
    label: "Enable write sharding (0-9 prefix)"
    side_effect: >
      Write sharding enabled via feature flag — partition key prefix randomized.
      Write throttles drop to near-zero within 2 minutes as load distributes.
      Read path performs scatter-gather (10x read fan-out) — slight read latency increase.
      Trending badge feature continues to work.

  - id: scale_ecs_cluster
    type: scale_cluster
    service: product-catalog-service
    is_correct_fix: false
    label: "Scale product-catalog ECS to 16 tasks"
    side_effect: >
      16 ECS tasks now running. Each task immediately retries failed DynamoDB writes.
      Write storm amplifies: 2x the tasks × same retry logic = 2x the hot partition pressure.
      Throttle rate INCREASES from 23% to 31%. p99 latency gets worse.

  - id: rollback_v4_1_8
    type: rollback
    service: product-catalog-service
    is_correct_fix: false
    target_version: v4.1.8
    label: "Rollback to v4.1.8"
    side_effect: >
      Rolled back to v4.1.8. Trending badge removed from code. BUT: the flash sale is still
      running and the FLASH-SALE-2024-HOODIE product is still receiving 96% of write traffic
      due to external marketing links and customer demand — not because of the badge feature.
      Write throttles reduce by only ~15% (badge-driven writes were a fraction of total).
      Partition is still hot. Error rate remains at ~18%.

  - id: request_quota_increase
    type: emergency_deploy
    service: product-catalog-service
    is_correct_fix: false
    label: "File AWS Support ticket for quota increase"
    side_effect: >
      AWS Support responds in 4 hours. They explain that per-partition throughput is a
      DynamoDB fundamental and cannot be increased via quota. They recommend write sharding
      or DAX. You've wasted 4 hours during a live incident.

  - id: enable_dax
    type: toggle_feature_flag
    service: product-catalog-service
    is_correct_fix: false
    flag_id: dax_enabled
    flag_enabled: true
    label: "Enable DAX read cache"
    side_effect: >
      DAX enabled — read traffic now routes through the cache. Read latency drops 40%.
      Write throttles are COMPLETELY UNAFFECTED. DAX is a read-through cache and does
      not intercept write traffic. Error rate stays at 23%. Write partition is still hot.

  - id: throttle_flash_sale_writes
    type: throttle_traffic
    service: product-catalog-service
    is_correct_fix: true
    label: "Throttle inventory write traffic for FLASH-SALE-2024-HOODIE"
    side_effect: >
      Write rate to the hot partition drops below the 1000 WCU/s cap. Throttle errors
      drop to ~2% (background retry noise). Inventory updates are delayed but not lost —
      they queue and drain once the partition is no longer saturated. Structural fix
      (write sharding) still needed before next flash sale.
    throttle_targets:
      - id: flash-sale-writes
        scope: endpoint
        label: "PUT /products/FLASH-SALE-2024-HOODIE/inventory"
        description: "Inventory write endpoint for the hot product"
        llm_hint: "Throttling specifically the inventory write path for FLASH-SALE-2024-HOODIE reduces hot partition pressure directly. Does not affect reads or other products."
        unit: rps
        baseline_rate: 340

evaluation:
  root_cause: >
    The v4.2.0 "trending badge" deploy (4h before incident) configured FLASH-SALE-2024-HOODIE
    as a trending product. This caused every view counter update, inventory write, and price
    change for that product to use the same DynamoDB partition key. When the flash sale reached
    peak traffic, writes to that single partition exceeded the DynamoDB per-partition hard cap
    of 1000 WCU/s. On-demand billing mode cannot circumvent this cap — it only scales
    total table throughput, not per-partition throughput. The diagnosis required understanding
    that ProvisionedThroughputExceededException on an on-demand table means hot partition,
    not total capacity exhaustion.

  relevant_actions:
    - action: search_logs
      why: "Logs contain the critical clue: hot partition detected on 'product#FLASH-SALE-2024-HOODIE' at 987/1000 WCU. Also reveals WRITE_SHARDING_ENABLED=false and DAX_ENABLED=false in config."
    - action: read_wiki_page
      why: "DynamoDB Hot Partition Recovery Guide explains the per-partition cap and recovery options. ADR-2024-07 explains why capacity alarms were disabled."
    - action: view_deployment_history
      why: "v4.2.0 deploy 4h ago introduced the trending badge that caused write concentration. Critical correlation."
    - action: direct_message_persona
      why: "Contacting Tom Bradley or Priya Mehta confirms the hot partition hypothesis and unblocks the fix decision."
    - action: toggle_feature_flag
      why: "Disabling the trending badge flag (disable_trending_badge) or enabling write sharding (enable_write_sharding) resolves the hot partition."
      service: product-catalog-service
      remediation_action_id: disable_trending_badge
    - action: mark_resolved
      why: "Confirms incident resolution once write throttles return to baseline."

  red_herrings:
    - action: scale_cluster
      why: "Scaling ECS amplifies the write storm — each new instance retries to the same hot partition, increasing throttle rate."
    - action: trigger_rollback
      why: "Rollback removes the badge code but the product remains viral — external traffic continues concentrating writes on the same partition key. Only ~15% reduction in throttles."
    - action: suppress_alarm
      why: "Suppressing alarms during active investigation delays resolution."
    - action: toggle_feature_flag
      why: "Enabling DAX (read cache) has zero impact on write throttles. A common mistake: DAX helps reads, not writes."
      remediation_action_id: enable_dax

  debrief_context: |
    This scenario tests understanding of DynamoDB's internal partitioning model — a gap
    that catches even experienced engineers who know DynamoDB well but have never hit a
    hot partition on an on-demand table.

    The trap is multi-layered:
    1. On-demand billing causes engineers to believe throttling is impossible
    2. The ADR explicitly says capacity alarms are disabled because "auto-scaling handles it"
    3. The table-level WCU looks healthy in the console — only partition-level metrics reveal the problem
    4. Scaling the app tier makes things WORSE (more retries to same partition)
    5. DAX is a plausible but completely wrong fix for a write-heavy hot partition

    The correct diagnosis path:
    search_logs → "product#FLASH-SALE-2024-HOODIE" at 987/1000 WCU →
    cross-reference with v4.2.0 deploy → trending badge → write sharding or disable flag

    Post-incident: ADR-2024-07 should be updated to note that hot partition scenarios
    are not protected by on-demand mode. Consider enabling write sharding by default for
    any product that can appear on a high-traffic landing page.
