  - id: email-001
    at_second: 0
    thread_id: thread-catalog-degradation
    from: tom-walsh
    to: trainee
    subject: "[ALERT] catalog-service: p99 latency climbing, one OOM restart"
    body: |
      Hey,

      catalog-service p99 has been slowly climbing for the past hour — started around
      200ms, now at 800ms and still going up. Got one OOM restart on one of the
      Fargate tasks about 20 min ago; it came back but the latency never recovered.

      No obvious traffic spike. DB looks fine. Opened CAT-203.

      — Tom

  - id: email-002
    at_second: 360
    thread_id: thread-catalog-degradation
    from: tom-walsh
    to: trainee
    subject: "[ALERT] catalog-service: p99 latency climbing, one OOM restart"
    body: |
      Update: heap metrics are climbing across all 3 instances. Seeing the sawtooth
      pattern you'd expect from GC pressure. This looks like it might be a leak.

      Last deploy was v4.2.0 yesterday morning (new image caching). Could be related.

      — Tom

