wiki:
  pages:
    - title: "catalog-service Runbook"
      content: |
        # catalog-service Runbook

        ## Architecture

        Java/Spring Boot service on ECS Fargate (3 instances). Heap: 4GB per instance.
        JVM flags: `-Xmx4g -Xms1g -XX:+UseG1GC`

        ## Memory Leak Diagnosis

        **Symptoms of JVM memory leak:**
        - Heap climbing steadily between GC cycles (rising sawtooth floor)
        - GC pauses increasing in duration
        - p99 latency correlates with GC pause frequency
        - Eventually: OOM kill + ECS task restart

        **JDK Flight Recorder / heap dump:**
        1. Connect to Fargate task via ECS Exec
        2. `jcmd <pid> GC.heap_info` — current heap breakdown
        3. `jmap -dump:format=b,file=/tmp/heap.hprof <pid>` — heap dump
        4. Analyse with Eclipse MAT or VisualVM

        **Quick resolution:**
        1. Roll back the most recent deploy that touched memory management
        2. Verify heap stabilises post-rollback

    - title: "JVM Memory Leak Patterns"
      content: |
        # JVM Memory Leak Patterns

        ## Sawtooth with Rising Baseline

        The classic leak signature: GC runs successfully (saw teeth) but cannot
        collect all objects (baseline rises each cycle). Eventually OOM.

        Causes in Spring Boot services:
        - Unbounded caches (no eviction policy)
        - Static collections holding strong references
        - ThreadLocal leaks
        - Third-party library memory leaks

        ## ImageCacheManager Known Issues

        `com.acme.imagetools:ImageCacheManager:2.1.x` has a known issue (IMGCM-441)
        where the default cache policy is `STRONG_REFERENCE` with no size or TTL limit.
        Products with many image variants can cause unbounded growth.

        **Workaround:** Downgrade to 2.0.x or configure:
        ```yaml
        image-cache:
          max-size-mb: 256
          ttl-seconds: 3600
          reference-type: SOFT
        ```

