id: memory-leak-jvm
title: "Catalog Service: JVM Memory Leak — Gradual Degradation"
description: >
  The catalog service is slowly degrading. p99 latency has been creeping up over
  the last hour and the service just crashed and restarted once. A new build
  was deployed yesterday morning.
difficulty: medium
tags: [jvm, memory-leak, gradual-degradation, catalog]

timeline:
  default_speed: 2
  duration_minutes: 20
  pre_incident_seconds: 120 # trainee sees 2min of recent history; the leak has been running for an hour already (established by email/ticket)
  resolution_seconds: 120

topology:
  focal_service:
    name: catalog-service
    description: "Product catalog API — Java/Spring Boot, ECS Fargate."
    owner: tom-walsh
    typical_rps: 120
    traffic_profile: business_hours_web
    health: degraded
    components:
      - id: alb
        type: load_balancer
        label: "ALB"
        inputs: []
      - id: ecs
        type: ecs_cluster
        label: "catalog-service ECS (Fargate)"
        instance_count: 3
        utilization: 0.45
        inputs: [alb]
      - id: catalog_db
        type: rds
        label: "catalog-db (RDS PostgreSQL)"
        instance_count: 1
        max_connections: 100
        utilization: 0.35
        connection_utilization: 0.30
        inputs: [ecs]
    incidents:
      - id: memory_leak
        affected_component: ecs
        description: "JVM memory leak introduced in v4.2.0 — a new image caching layer holds strong references to product images, preventing GC. Heap grows ~18MB/minute per instance. After ~45 minutes instances hit OOM, ECS restarts them, then the cycle begins again."
        onset_overlay: gradual_degradation
        onset_second: 0
        magnitude: 4.0
        ramp_duration_seconds: 600
      - id: oom_latency_spike
        affected_component: ecs
        description: "p99 latency degrades in steps as GC pauses lengthen under heap pressure."
        onset_overlay: gradual_degradation
        onset_second: 0
        magnitude: 6.0
        ramp_duration_seconds: 600
  upstream:
    - name: storefront-bff
      description: "Backend-for-frontend that calls catalog-service for product data."
  downstream:
    - name: catalog-db
      description: "PostgreSQL — catalog product data."
      correlation: exonerated
    - name: image-cdn
      description: "CDN serving product images. Healthy — not the source of the leak."
      correlation: exonerated

engine:
  tick_interval_seconds: 15
  default_tab: email
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 2

personas:
  - id: tom-walsh
    display_name: "Tom Walsh"
    job_title: "Software Engineer"
    team: "Catalog"
    avatar_color: "#F59E0B"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Tom Walsh, SWE on the Catalog team. You own catalog-service.
      You noticed latency climbing slowly and the service restarted once about
      20 minutes ago — ECS restarted the task after an OOM kill.

      You deployed v4.2.0 yesterday morning (a new image caching feature using
      a third-party library). You suspect the new caching layer may be involved
      but haven't confirmed it.

      Share the deploy info only if the trainee asks about recent changes or
      what changed in v4.2.0. If asked: "v4.2.0 added a product image cache using
      the ImageCacheManager library. It's supposed to improve page load times but
      I've seen some complaints online about memory leaks in that library."

      Keep responses concise (1-3 sentences). Friendly but concerned tone.

  - id: maya-osei
    display_name: "Maya Osei"
    job_title: "Staff SRE"
    team: "Platform Reliability"
    avatar_color: "#8B5CF6"
    initiates_contact: false
    cooldown_seconds: 120
    silent_until_contacted: true
    system_prompt: |
      You are Maya Osei, Staff SRE. You've seen JVM memory leak patterns before.
      If contacted and asked about the heap metrics or GC behavior, confirm that
      the pattern (sawtooth with a rising baseline) is classic memory leak.

      "That sawtooth heap pattern with a rising floor is a textbook leak —
      GC is running but can't collect everything. The fact that latency is
      climbing in lockstep confirms the heap pressure is causing longer GC pauses.
      Rolling back the last deploy that touched memory management is usually
      the right first move."

      Be direct and technical.

