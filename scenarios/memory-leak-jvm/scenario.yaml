remediation_actions:
  - id: rollback_catalog_v4_1_9
    type: rollback
    service: catalog-service
    is_correct_fix: true
    target_version: v4.1.9
    side_effect: "Reverts to v4.1.9 (no ImageCacheManager). Heap stabilises within 10 minutes post-restart."

  - id: restart_catalog
    type: restart_service
    service: catalog-service
    is_correct_fix: false
    side_effect: "Tasks restart and heap resets — but the leak is still in v4.2.0. Latency recovers for ~45 minutes then degrades again."

  - id: scale_catalog
    type: scale_cluster
    service: catalog-service
    is_correct_fix: false
    label: "Scale to 6 instances"
    side_effect: "More instances buy time but don't fix the leak — each new instance leaks at the same rate."

  - id: emergency_fix
    type: emergency_deploy
    service: catalog-service
    is_correct_fix: true
    target_version: v4.2.1
    label: "Deploy v4.2.1 (cache config fix)"
    side_effect: "Deploys v4.2.1 with ImageCacheManager configured for SOFT references and 256MB limit. Heap stabilises."

evaluation:
  root_cause: >
    v4.2.0 introduced ImageCacheManager with default STRONG_REFERENCE cache and no
    size or TTL limit. Product images accumulate in the cache without eviction,
    causing JVM heap to grow ~18MB/minute per instance. After ~45 minutes instances
    OOM-kill and restart, but the cycle repeats immediately. Fix: rollback to v4.1.9
    or deploy v4.2.1 with corrected cache configuration.

  relevant_actions:
    - action: view_deployment_history
      why: "v4.2.0 deployed 22 hours ago — temporal correlation with the leak onset. The deploy introduced ImageCacheManager."
    - action: search_logs
      why: "JVM heap logs show ImageCacheManager cache size growing, evictions=0 — confirms unbounded cache."
    - action: read_wiki_page
      why: "JVM Memory Leak Patterns wiki documents ImageCacheManager 2.1.x as a known leaker."
    - action: trigger_rollback
      why: "Rolling back to v4.1.9 removes the leak — heap stabilises post-rollback."
      service: catalog-service
      remediation_action_id: rollback_catalog_v4_1_9
    - action: monitor_recovery
      why: "Heap should stabilise within 10 minutes of rollback — confirm via JVM memory metric."

  red_herrings:
    - action: restart_service
      why: "Restarting clears the heap temporarily but the leak is still present in v4.2.0. Degradation recurs in ~45 minutes."
    - action: scale_cluster
      why: "Scaling adds instances but each leaks at the same rate — buys time but doesn't fix the problem."
    - action: suppress_alarm
      why: "Silencing the latency alarm without fixing the leak lets the situation worsen."

  debrief_context: |
    This scenario tests recognising gradual degradation patterns vs sudden spikes,
    and understanding JVM memory leak signatures. The sawtooth heap with rising baseline
    is the key visual signal.

    The temporal correlation (v4.2.0 deployed 22 hours ago, leak onset gradual) is
    subtler than a bad deploy that fails immediately — the leak takes 45 minutes per
    cycle to manifest. The wiki is the key resource that names ImageCacheManager as
    the culprit.

    Common mistakes: (1) restarting instead of rolling back — tasks restart healthy
    but degrade again, (2) scaling out — more instances buy time but don't fix the
    root cause, (3) not correlating with the deploy timeline.
