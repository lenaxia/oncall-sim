ticketing:
  - id: CAT-203
    title: "catalog-service: gradual latency degradation — suspected memory leak"
    severity: SEV2
    status: open
    description: |
      ## Summary

      catalog-service p99 latency increasing gradually since ~T-1h.
      One OOM-triggered ECS task restart at T-20min. Heap metrics showing
      sawtooth pattern with rising baseline — consistent with memory leak.

      ## Symptoms

      - p99 latency: ~200ms baseline → climbing ~50ms/minute
      - JVM heap: climbing with sawtooth GC pattern, floor rising each cycle
      - One ECS OOM restart at T-20min (task restarted automatically)
      - DB and upstream: healthy

      ## Timeline

      - T-24h — v4.2.0 deployed (new ImageCacheManager image caching feature)
      - T-1h — Latency alarm fires (p99 > 500ms)
      - T-20min — OOM restart on ecs task 1
      - T+0:00 — Trainee engaged

      ## Hypotheses

      1. Memory leak in v4.2.0 ImageCacheManager library
      2. Traffic growth exceeding heap tuning (RPS looks normal)
      3. External dependency (DB, CDN) holding connections (both look fine)

    created_by: tom-walsh
    assignee: trainee
    at_second: -1200

