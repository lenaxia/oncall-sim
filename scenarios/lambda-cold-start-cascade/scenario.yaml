wiki:
  pages:
    - title: "order-processor Runbook"
      content: |
        # order-processor Runbook

        ## Architecture

        Orders flow: API Gateway → order-event-processor (Lambda) → order-events (Kinesis)
        → downstream consumers (inventory-service, notification-service)

        **Critical Lambda config:**
        | Parameter | Normal Value | Notes |
        |---|---|---|
        | `reserved_concurrency` | 200 | Set in Lambda console — per-function limit |
        | `batch_size` | 100 | Kinesis records per Lambda invocation |
        | `starting_position` | TRIM_HORIZON | Read from beginning on new consumer |

        ## Lambda Throttling

        **Symptoms:**
        - ConcurrentExecutionLimitExceeded errors in CloudWatch Logs
        - Kinesis iterator age growing (consumer falling behind)
        - SQS DLQ filling (retry exhaustion)

        **Check:**
        1. Lambda console → order-event-processor → Configuration → Concurrency
        2. Verify reserved_concurrency is 200 (not lower)
        3. Check for automated scripts that modify Lambda config

        **Resolution:**
        - Update reserved_concurrency to 200 via Lambda console or CLI
        - Kinesis backlog will drain automatically once concurrency is restored
        - Monitor iterator age until it returns to < 1 minute

        ## Lambda Cost Optimizer Script

        An automated script (Lambda-Cost-Optimizer) runs nightly at 2am and
        adjusts reserved concurrency based on the previous night's peak usage.
        It has caused incidents before when run during low-traffic periods (maintenance
        windows, holidays). Contact @alex-kim (Infrastructure) if you suspect it.

    - title: "Kinesis Troubleshooting"
      content: |
        # Kinesis Consumer Troubleshooting

        ## Iterator Age

        `GetRecords.IteratorAgeMilliseconds` — time between when the record was written
        to the stream and when it was read by the consumer.

        - **Healthy**: < 60 seconds
        - **Warning**: 1-5 minutes (consumer falling behind)
        - **Critical**: > 5 minutes (significant backlog, DLQ risk)

        ## Common Causes of Growing Iterator Age

        1. **Consumer throttled** — Lambda concurrency limit hit
        2. **Consumer too slow** — batch processing time exceeds shard throughput
        3. **Shard count insufficient** — stream throughput exceeded

        ## DLQ Investigation

        If SQS DLQ is filling: check Lambda error logs for the failure reason.
        Messages in the DLQ have exhausted all retry attempts (default: 3).

