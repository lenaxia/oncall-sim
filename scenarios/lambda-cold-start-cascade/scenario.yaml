id: lambda-cold-start-cascade
title: "Order Processor: Lambda Concurrency Limit Exhausted"
description: >
  The order processing pipeline is backing up. Customers are reporting delayed
  order confirmations and some orders appear stuck. A cost-saving script ran
  overnight and may have changed something.
difficulty: medium
tags: [lambda, kinesis, serverless, concurrency, queue]

timeline:
  default_speed: 2
  duration_minutes: 20
  pre_incident_seconds: 28800
  resolution_seconds: 60

topology:
  focal_service:
    name: order-processor
    description: "Serverless order processing pipeline — API Gateway → Lambda → Kinesis → SQS."
    owner: priya-nair
    typical_rps: 150
    traffic_profile: always_on_api
    health: degraded
    components:
      - id: apigw
        type: api_gateway
        label: "Order API (API Gateway)"
        inputs: []
      - id: processor
        type: lambda
        label: "order-event-processor (Lambda)"
        reserved_concurrency: 10 # throttled down by cost-saving script (was 200)
        lambda_utilization: 0.90 # near saturation immediately
        inputs: [apigw]
      - id: event_stream
        type: kinesis_stream
        label: "order-events (Kinesis)"
        shard_count: 4
        inputs: [processor]
      - id: dlq
        type: sqs_queue
        label: "order-events-DLQ (SQS)"
        inputs: [event_stream]
    incidents:
      - id: lambda_saturation
        affected_component: processor
        description: "Lambda reserved concurrency set to 10 by automated cost-saving script (was 200). Morning traffic immediately saturates the concurrency limit — all 10 executions in use, new invocations throttled."
        onset_overlay: saturation
        onset_second: 60
        magnitude: 1.0
      - id: queue_backlog
        affected_component: event_stream
        description: "Kinesis iterator age climbing — Lambda throttling causes consumers to fall behind. Events accumulate in the stream."
        onset_overlay: gradual_degradation
        onset_second: 60
        magnitude: 8.0
        ramp_duration_seconds: 60
      - id: dlq_accumulation
        affected_component: dlq
        description: "SQS DLQ filling as events exhaust retry attempts from Kinesis."
        onset_overlay: gradual_degradation
        onset_second: 180
        magnitude: 6.0
        ramp_duration_seconds: 120
  upstream:
    - name: customer-app
      description: "Customer-facing web/mobile app that submits orders."
  downstream:
    - name: inventory-service
      description: "Updates inventory on order confirmation — delayed but not failing."
      correlation: exonerated
    - name: notification-service
      description: "Sends order confirmation emails — queue backing up, delayed delivery."
      correlation: exonerated

engine:
  tick_interval_seconds: 15
  default_tab: email
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 2

personas:
  - id: priya-nair
    display_name: "Priya Nair"
    job_title: "Senior Software Engineer"
    team: "Order Processing"
    avatar_color: "#0EA5E9"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Priya Nair, Senior SWE on the Order Processing team. You own the
      order-processor Lambda pipeline. You noticed customers reporting delayed
      confirmations and opened a ticket.

      You know there's an automated cost-saving script (AWS Lambda Cost Optimizer)
      that runs every night at 2am. It adjusts reserved concurrency based on the
      previous 7 days of usage. Last night traffic was unusually low (maintenance
      window), so the script reduced order-event-processor concurrency from 200 to 10.

      Share this only if the trainee asks about recent config changes, Lambda config,
      or the cost-saving script specifically. If they ask: "The Lambda Cost Optimizer
      script runs nightly. It set order-event-processor concurrency to 10 based on
      last night's low traffic. Normal setting is 200."

      Keep responses concise (1-3 sentences). Slack-style tone.

  - id: alex-kim
    display_name: "Alex Kim"
    job_title: "Platform Engineer"
    team: "Infrastructure"
    avatar_color: "#10B981"
    initiates_contact: false
    cooldown_seconds: 120
    silent_until_contacted: true
    system_prompt: |
      You are Alex Kim, Platform Engineer. You own the Lambda Cost Optimizer script.
      If contacted, you confirm the script ran at 2:14am and reduced order-event-processor
      reserved concurrency from 200 to 10. You can share the change log.

      "Yeah, the optimizer ran at 2:14am. It saw ~8 concurrent executions max last night
      (maintenance window had low traffic) and set reserved_concurrency to 10 with a 20%
      buffer. The config change is in the Lambda console under order-event-processor →
      Concurrency. Just update it back to 200 and the backlog will drain."

      Be direct and technical.

