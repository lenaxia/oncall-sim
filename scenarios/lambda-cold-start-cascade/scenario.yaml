remediation_actions:
  - id: update_lambda_concurrency
    type: scale_cluster
    service: order-processor
    is_correct_fix: true
    label: "Restore Lambda concurrency to 200"
    side_effect: "Sets order-event-processor reserved_concurrency=200. Throttling stops immediately. Kinesis backlog drains over ~5 minutes."

  - id: restart_lambda
    type: restart_service
    service: order-processor
    is_correct_fix: false
    side_effect: "Lambda functions are stateless — 'restarting' has no effect on concurrency limits."

  - id: scale_kinesis
    type: scale_cluster
    service: order-processor
    is_correct_fix: false
    label: "Add Kinesis shards"
    side_effect: "Adding shards increases throughput capacity but does nothing for Lambda concurrency — throttling continues."

  - id: rollback_processor
    type: rollback
    service: order-processor
    is_correct_fix: false
    target_version: v3.1.3
    side_effect: "Rolling back the Lambda code doesn't change the concurrency config — the Cost Optimizer sets concurrency independently of deploys."

evaluation:
  root_cause: >
    The Lambda Cost Optimizer script ran at 2:14am during a scheduled maintenance
    window when traffic was unusually low. It observed only ~8 concurrent executions
    and set order-event-processor reserved_concurrency to 10. When normal morning
    traffic arrived, the 10-concurrency limit was immediately saturated, causing
    throttling, Kinesis consumer lag, and DLQ accumulation.

  relevant_actions:
    - action: search_logs
      why: "Lambda throttle logs and ConcurrentExecutionLimitExceeded messages directly identify the concurrency limit problem."
    - action: view_deployment_history
      why: "No recent deploys — rules out code regression and points toward config/infra change."
    - action: read_wiki_page
      why: "Runbook describes Lambda throttling and the Cost Optimizer script as a known cause."
    - action: scale_cluster
      why: "Restoring reserved_concurrency to 200 is the correct fix."
      service: order-processor
      remediation_action_id: update_lambda_concurrency
    - action: monitor_recovery
      why: "Kinesis iterator age should return below 1 minute within 5 minutes of fix."

  red_herrings:
    - action: restart_service
      why: "Lambda is stateless — no concept of restart. Concurrency config is separate from function code/state."
    - action: trigger_rollback
      why: "The last code deploy was 2 days ago. The concurrency change happened at 2am via a script, not a deploy."
    - action: scale_cluster
      why: "Adding Kinesis shards doesn't fix Lambda concurrency — the bottleneck is the Lambda limit, not stream throughput."

  debrief_context: |
    This scenario tests recognising that automated infrastructure scripts can
    cause incidents outside of the normal deploy pipeline. The key insight:
    the CloudWatch Logs show ConcurrentExecutionLimitExceeded with reserved=10 —
    not a code error, a config limit.

    Common mistakes: (1) chasing the Kinesis iterator age alarm (symptom, not cause),
    (2) rolling back the Lambda code (unrelated to concurrency config), (3) not
    checking the wiki which documents the Cost Optimizer script as a known hazard.
