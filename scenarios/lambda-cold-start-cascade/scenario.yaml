ticketing:
  - id: ORD-881
    title: "order-processor: delayed order confirmations — Lambda throttling"
    severity: SEV2
    status: open
    description: |
      ## Summary

      order-event-processor Lambda is throttling under normal morning traffic.
      Order confirmations delayed 10+ minutes. Kinesis iterator age growing.

      ## Symptoms

      - Lambda throttle rate: ~85% of invocations throttled
      - Concurrent executions: maxing at 10 (expected: ~120 during peak)
      - Kinesis iterator age: climbing (5min and growing)
      - SQS DLQ: beginning to fill
      - Customer impact: orders stuck in "processing" state

      ## Timeline

      - T-8h (2:14am) — Lambda Cost Optimizer script ran
      - T+0:00 — Morning traffic ramp begins, throttles appear
      - T+0:05 — Kinesis iterator age alarm fires
      - T+0:08 — This ticket opened

      ## Hypotheses

      1. Lambda reserved concurrency changed overnight (most likely)
      2. Traffic spike exceeding normal concurrency (RPS looks normal)
      3. Lambda code regression (no recent deploys)

    created_by: priya-nair
    assignee: trainee
    at_second: -120

alarms:
  - id: alarm-kinesis-age
    service: order-processor
    metric_id: queue_age_ms
    condition: "Kinesis iterator age > 60000ms (1 minute)"
    severity: SEV2
    threshold: 60000
    auto_fire: true
    auto_page: true
    page_message: "order-processor Kinesis iterator age exceeded 1 minute. Order pipeline backing up."
  - id: alarm-lambda-throttles
    service: order-processor
    metric_id: concurrent_executions
    condition: "concurrent_executions at reserved limit"
    severity: SEV2
    threshold: 9
    auto_fire: true
    auto_page: false

