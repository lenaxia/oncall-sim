  - id: email-001
    at_second: 0
    thread_id: thread-order-delay
    from: priya-nair
    to: trainee
    subject: "[ALERT] order-processor: Lambda throttling, queue backing up"
    body: |
      Hey,

      Order confirmations are delayed — customers are seeing orders stuck in "processing"
      for 10+ minutes. The Kinesis iterator age alarm fired.

      Lambda is showing throttles and the DLQ is starting to fill. Something changed
      overnight — I'm digging but could use help.

      Ticket: ORD-881

      — Priya

  - id: email-002
    at_second: 240
    thread_id: thread-order-delay
    from: priya-nair
    to: trainee
    subject: "[ALERT] order-processor: Lambda throttling, queue backing up"
