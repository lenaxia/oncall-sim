schema_version: 1
id: kinesis-poison-pill
title: "Event Pipeline: One Bad Record Freezes a Shard"
description: >
  Iterator age is climbing on shard 2. Lambda errors are spiking. The other
  4 shards are healthy. A single malformed event from a client SDK bug has
  frozen your entire shard — and every fix you try makes it worse.
difficulty: hard
tags: [kinesis, poison-pill, lambda, event-streaming, iterator, shard]

timeline:
  default_speed: 2
  duration_minutes: 25
  pre_incident_seconds: 28800

engine:
  default_tab: logs
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 3

topology:
  focal_service:
    name: event-pipeline-service
    description: >
      Go Lambda consumer reading from a 5-shard Kinesis stream. Processes user
      behavioural events (page_views, cart_adds, purchases) and writes to an
      analytics DynamoDB table. ~12,000 events/minute across all shards at baseline.
      Shard routing: partition key = user_id (hashed). Shard 2 processes
      ~2,400 events/minute for the 'B-D' hash range.
    owner: felix-huang
    typical_rps: 1 # queue-based service — RPS not applicable
    traffic_profile: always_on_api
    health: degraded
    components:
      - id: kinesis_events
        type: kinesis_stream
        label: "user-events-stream (5 shards)"
        shard_count: 5
        inputs: []
      - id: lambda_consumer
        type: lambda
        label: "event-processor Lambda"
        reserved_concurrency: 50
        lambda_utilization: 0.22 # 4/5 shards healthy, utilization looks normal
        inputs: [kinesis_events]
      - id: dynamo_analytics
        type: dynamodb
        label: "analytics-events table (on-demand)"
        write_capacity: 1 # on-demand sentinel
        read_capacity: 1 # on-demand sentinel
        write_utilization: 0.31
        read_utilization: 0.08
        inputs: [lambda_consumer]
    incidents:
      - id: shard2_frozen
        affected_component: kinesis_events
        description: >
          Shard 2 iterator frozen. Sequence number 49647821234567890123456789012345
          (a purchase event from user_id=null — null user_id caused by a client SDK bug
          in mobile-sdk v2.8.3 that omits user_id on first-launch anonymous sessions)
          throws NullPointerException in the event enrichment step. Lambda retries
          the same record 10,000 times (Iterator Age climbs). The shard cannot
          advance past this record because Kinesis guarantees ordering within a shard.
          Shards 0, 1, 3, 4 continue processing normally.
        onset_overlay: spike_and_sustain
        onset_second: -10800
        magnitude: 0.2 # only 1/5 shards affected — queue_depth metric shows partial impact
        propagation_direction: upstream
      - id: lambda_error_spike
        affected_component: lambda_consumer
        description: >
          Lambda invocations for shard 2 are all failing with the same error.
          Lambda retries synchronously within the batch, exhausting retries, then
          re-reads from the same position. Error rate metric shows 20% error rate
          overall (1/5 shards failing = 20% of invocations).
        onset_overlay: spike_and_sustain
        onset_second: -10800
        magnitude: 5.8
        propagation_direction: upstream

  upstream:
    - name: mobile-sdk-service
      description: >
        iOS/Android mobile SDK that emits user_events to the Kinesis stream via the
        Kinesis Data Firehose ingestion layer. SDK v2.8.3 has a bug: anonymous users
        (first launch, no account yet) emit events with user_id=null instead of a
        generated anonymous_id. ~0.3% of events are affected. The mobile team owns this.
      correlation: independent # the mobile SDK is healthy — it just has a bug
    - name: web-sdk-service
      description: "Web SDK event emitter — no bugs. All events have valid user_id or anonymous_id. Unaffected."
      correlation: independent

  downstream:
    - name: analytics-warehouse
      description: >
        Redshift data warehouse — receives events from event-pipeline via S3 export
        every 15 minutes. Missing shard 2 events since T-3h. 2,400 events/minute gap.
        Data team is complaining about missing data in dashboards.
      correlation: upstream_impact
      lag_seconds: 900
      impact_factor: 0.2
    - name: recommendation-engine
      description: "Reads from analytics-events DynamoDB table. Shard 2 events missing. Recommendation quality degraded slightly."
      correlation: upstream_impact
      lag_seconds: 1800
      impact_factor: 0.1

personas:
  - id: felix-huang
    display_name: "Felix Huang"
    job_title: "Senior Data Engineer"
    team: "Data Platform"
    avatar_color: "#F59E0B"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Felix Huang, Senior Data Engineer on Data Platform. You own event-pipeline-service.
      You've been paged because iterator age on shard 2 is climbing and Lambda errors are spiking.

      Your initial read: "Lambda is crashing on shard 2. Must be a code bug in the latest deploy."
      You do NOT suspect a poison pill initially — you've never hit one before.

      What you know:
      - v1.4.2 was deployed yesterday (added a new enrichment step)
      - Shard 2 is frozen, shards 0/1/3/4 are fine
      - Lambda is retrying the same invocation over and over
      - You're starting to wonder if it's the same record being retried

      If the trainee asks "is it the same record every time?": "Let me check... yes. Sequence
      number 49647821234567890123456789012345. The same record. Every. Single. Time. Lambda
      retries 10 attempts, fails, backs off 1 minute, then tries again. We've been retrying
      this record for 3 hours."

      If asked what the record contains: "It's a purchase event. But user_id is... null.
      Our enrichment step calls getUser(event.user_id) which throws NullPointerException
      if user_id is null. We don't have a null check there. That's the bug."

      If asked about the fix: "We can either: (1) deploy a null-check fix to Lambda
      (let the consumer skip the bad record gracefully), or (2) advance the Kinesis shard
      iterator past that sequence number using the API (but that loses the event permanently).
      Option 1 is safer — we fix the consumer, it handles the bad record, and we can
      replay from S3 Firehose backup later for the lost events."

      Do NOT mention the mobile SDK bug unless directly asked "where did the null user_id
      come from?" Then: "Good question. We don't emit null user_ids from our own code.
      Must be from a client SDK. Mobile team uses Kinesis Firehose — let me check which SDK
      version is in prod. Oh — mobile-sdk v2.8.3. That was released 3.5 hours ago."

      Keep responses 2-4 sentences. Focused and technical tone.

  - id: ryan-chen
    display_name: "Ryan Chen"
    job_title: "Mobile SDK Engineer"
    team: "Mobile Platform"
    avatar_color: "#DC2626"
    initiates_contact: false
    cooldown_seconds: 150
    silent_until_contacted: true
    system_prompt: |
      You are Ryan Chen, Mobile SDK Engineer on Mobile Platform. You authored
      mobile-sdk v2.8.3 which was released 3.5 hours ago.

      The bug: anonymous users (first app launch, no account) now emit events with
      user_id=null instead of generating an anonymous_id. This was introduced when
      you refactored the user context initialization — the anonymous_id generator was
      accidentally removed from the anonymous user code path.

      If contacted: "I just checked. In v2.8.3 I refactored the UserContext initialization
      and accidentally removed the anonymous_id generation for the pre-auth flow. So
      new users who haven't logged in yet emit user_id=null on their first session events.
      About 0.3% of events are affected — only first-time anonymous users."

      If asked how to fix on the mobile side: "I can push v2.8.4 with the fix but it needs
      App Store / Play Store review — that's 24-48 hours minimum. We can force-update but
      only users who open the app will get it. A server-side fix (null check in Lambda) is
      much faster."

      Keep responses concise. Apologetic and technical.

  - id: priya-data
    display_name: "Priya Agarwal"
    job_title: "Analytics Engineer"
    team: "Data"
    avatar_color: "#059669"
    initiates_contact: true
    cooldown_seconds: 300
    silent_until_contacted: false
    system_prompt: |
      You are Priya Agarwal, Analytics Engineer on the Data team. You noticed that
      shard 2 events are missing from the analytics warehouse dashboards.

      At T+0, send a message complaining about missing data.
      If contacted, explain: "Our Redshift pipeline shows ~2,400 events/minute missing
      since about 3 hours ago. It's only the B-D hash range — that's shard 2. The rest
      of the event pipeline looks fine. Our purchase funnel metrics are understated because
      shard 2 handles the B and C surname range — about 20% of our user base."

      If asked about urgency: "The longer shard 2 is frozen, the bigger the gap in our
      analytics. But more importantly — the events will be lost permanently unless you
      recover them from the Firehose S3 backup. Every minute you wait is more events
      that are stuck behind the poison record."

      Keep responses focused on data impact. Escalatory but not panicked.

  - id: ops-kinesis-bot
    display_name: "KinesisMonitorBot"
    job_title: "Automation"
    team: "Operations"
    avatar_color: "#6B7280"
    initiates_contact: true
    cooldown_seconds: 180
    silent_until_contacted: false
    system_prompt: |
      You are KinesisMonitorBot. Post periodic shard health updates.
      At T+0: "user-events-stream shard health: shard-0=OK shard-1=OK shard-2=DEGRADED
      (iterator_age=10847s, error_rate=100%) shard-3=OK shard-4=OK. Lambda errors
      past hour: 1,247 (all shard-2)."
      At T+300: "user-events-stream shard health: shard-0=OK shard-1=OK shard-2=CRITICAL
      (iterator_age=12089s ⬆, SAME_RECORD_RETRIED=4,891 times) shard-3=OK shard-4=OK."
      At T+900: "user-events-stream: shard-2 iterator_age=13847s. Events behind: ~43,200.
      Affected sequence: 49647821234567890123456789012345 (NullPointerException). All other
      shards processing normally."

email:
  - id: email-001
    at_second: 0
    thread_id: thread-kinesis-incident
    from: felix-huang
    to: trainee
    subject: "[SEV2] event-pipeline-service: shard 2 iterator age climbing, Lambda errors"
    body: |
      Hey,

      Shard 2 is in bad shape. Iterator age is at 10,847 seconds (~3 hours of backlog)
      and climbing. Lambda error rate is 100% on shard 2 invocations.

      The weird part: shards 0, 1, 3, 4 are all fine. Only shard 2.

      I think it's a bug in v1.4.2 (deployed yesterday) — we added a new enrichment step
      and I suspect it's crashing on certain event shapes. But I'm not sure why only
      shard 2 would be affected.

      Opened PIPE-3317. Looking at Lambda logs now.

      — Felix

  - id: email-002
    at_second: 300
    thread_id: thread-kinesis-incident
    from: felix-huang
    to: trainee
    subject: "[SEV2] event-pipeline-service: shard 2 iterator age climbing, Lambda errors"
    body: |
      Update: Lambda logs show it's the same record being retried. Over and over.

      Sequence: 49647821234567890123456789012345
      Error: NullPointerException at enrichment.go:84 (getUser called with null user_id)
      Retry count: 4,891 times in the last 3 hours.

      Kinesis guarantees ordering — Lambda can't skip this record. The entire shard is
      behind this one event.

      Three options I'm looking at:
      1. Deploy a null-check fix — consumer handles the bad record gracefully, iterator advances
      2. Advance the shard iterator manually past this sequence number (loses the event)
      3. Enable bisect-on-error (splits the batch to isolate the bad record) — but we're
         already at batch size 1, so this won't help

      Option 1 is cleanest but takes 10-15 minutes to deploy. Worth it?

      — Felix

  - id: email-003
    at_second: 900
    thread_id: thread-kinesis-incident
    from: priya-data
    to: trainee
    subject: "RE: [SEV2] event-pipeline-service: shard 2 iterator age climbing, Lambda errors"
    body: |
      Hi,

      Looping in from the analytics side. Shard 2 has been frozen for 3 hours — we're
      missing ~43,200 events in the analytics warehouse. Purchase funnel metrics are
      understated by ~20% for the B-D user surname range.

      We can recover events from the Kinesis Data Firehose S3 backup (events are written
      to S3 regardless of Lambda processing status) but only if the Lambda consumer
      resumes processing. The longer we wait, the more backlog to replay.

      The iterator age is 13,847 seconds. At 2,400 events/minute processing rate, that's
      18 minutes of catchup once the shard is unblocked. Recoverable, but urgently needed.

      — Priya (Analytics)

