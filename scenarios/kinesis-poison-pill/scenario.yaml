host_groups:
  - id: event-pipeline-lambda
    label: "event-processor Lambda (us-east-1)"
    service: event-pipeline-service
    instance_count: 5
    description: "1 Lambda invocation per shard × 5 shards. reserved_concurrency=50. Currently: 4 healthy invocations, 1 frozen on shard-2."

remediation_actions:
  - id: deploy_null_check_fix
    type: emergency_deploy
    service: event-pipeline-service
    is_correct_fix: true
    target_version: v1.4.3
    target_stage: prod
    label: "Deploy v1.4.3: null check in enrichment.go:84"
    side_effect: >
      v1.4.3 deployed with null-check in enrichment.go:84. Lambda processes the poison
      record gracefully (logs warning, uses session_id as anonymous identifier, forwards
      to DynamoDB without enriched user profile). SQS iterator advances past the bad
      record. Shard-2 begins processing backlog at 2,400 events/min. Full catchup in
      ~18 minutes. No events lost. Mobile-sdk v2.8.4 still needed to prevent future occurrences.

  - id: advance_iterator_manually
    type: emergency_deploy
    service: event-pipeline-service
    is_correct_fix: true
    label: "Manually advance shard-2 iterator past poison record"
    side_effect: >
      Shard-2 iterator advanced past seq=49647821234567890123456789012345. Shard immediately
      resumes processing. Catchup begins. The poison event is permanently skipped — not
      written to analytics-events. Recoverable from Firehose S3 backup at
      s3://event-pipeline-backup/ for manual replay. Faster than deploying a fix but
      requires manual Kinesis API operations and S3 replay planning.

  - id: scale_lambda_concurrency
    type: scale_cluster
    service: event-pipeline-service
    is_correct_fix: false
    label: "Increase Lambda reserved concurrency from 50 to 200"
    side_effect: >
      More Lambda workers are now allocated. However: Kinesis shard mapping is 1:1 —
      each shard has exactly one active Lambda invocation. Additional concurrency creates
      no new consumers for shard-2. The shard-2 invocation still hits the same poison
      record. Iterator age continues climbing. Error rate unchanged at 20%. You've
      increased cost with zero impact on the incident.

  - id: rollback_v1_4_1
    type: rollback
    service: event-pipeline-service
    is_correct_fix: false
    target_version: v1.4.1
    label: "Rollback event-pipeline to v1.4.1"
    side_effect: >
      Rolled back to v1.4.1 (no enrichment step). Lambda no longer calls getUser().
      However: v1.4.1 ALSO doesn't have a null check for user_id — it just doesn't
      call getUser(). v1.4.1 may still fail on the poison record for a different reason
      (missing required field validation). Even if it doesn't fail, the poison record
      was introduced by the PRODUCER (mobile-sdk), not the consumer version. The record
      is still in the stream. Shard-2 behavior is unpredictable with v1.4.1.

  - id: restart_lambda
    type: restart_service
    service: event-pipeline-service
    is_correct_fix: false
    label: "Force Lambda restart / redeploy (no code change)"
    side_effect: >
      Lambda cold starts. After warmup, resumes from the same Kinesis checkpoint —
      the same poison record. NullPointerException fires again within 2 seconds.
      Shard-2 remains frozen. You've added a 30-second cold start delay with no benefit.

evaluation:
  root_cause: >
    mobile-sdk v2.8.3 (released 3.5h before incident) introduced a bug in the anonymous
    user flow — first-time users emit events with user_id=null and anonymous_id=null.
    ~0.3% of events are affected. One such event (a purchase_completed event, sequence
    49647821234567890123456789012345) landed on Kinesis shard 2. The Lambda consumer
    (v1.4.2) introduced a user enrichment step that calls getUser(event.UserID) without
    a null check. The nil pointer dereference caused Lambda to fail on every attempt.
    Due to Kinesis ordering guarantees, the iterator cannot advance past the failed
    record — shard 2 has been frozen for 3.8 hours with 43,200 events queued behind it.
    Fix: deploy a null check to the Lambda consumer (v1.4.3) so it handles null user_id
    gracefully, allowing the iterator to advance and the shard to recover.

  relevant_actions:
    - action: search_logs
      why: >
        Logs are the primary diagnostic tool. They show: (1) same sequence number
        49647821234567890123456789012345 in every error, (2) NullPointerException at
        enrichment.go:84, (3) user_id=null in raw event payload, (4) sdk_version=mobile-sdk/2.8.3,
        (5) explicit note that 'increasing concurrency will not help', (6) Firehose backup location.
        All root cause information is in the logs.
    - action: read_wiki_page
      why: >
        'Kinesis Poison Pill Recovery Procedure' documents exactly this scenario, including
        both recovery options and the Kinesis API commands for manual iterator advance.
        'mobile-sdk Event Schema Requirements' documents the user_id requirement and
        mobile-sdk v2.8.3 as a CRITICAL BUG.
    - action: view_deployment_history
      why: >
        Shows v1.4.2 deployed yesterday (added enrichment step — the code that crashes),
        and mobile-sdk v2.8.3 deployed 3.5h ago (the producer bug). Both deployments
        are necessary to understand the full causal chain.
    - action: direct_message_persona
      why: >
        Contacting Felix Huang surfaces the exact retry count and confirms the poison pill
        diagnosis. Contacting Ryan Chen confirms the mobile-sdk bug and its scope (0.3% of events).
    - action: emergency_deploy
      why: "Deploying v1.4.3 with null check in enrichment.go:84 unblocks shard 2 and allows full recovery."
      service: event-pipeline-service
      remediation_action_id: deploy_null_check_fix
    - action: mark_resolved
      why: "After v1.4.3 deploys and shard-2 iterator age starts decreasing."

  red_herrings:
    - action: scale_cluster
      why: "Kinesis is 1:1 shard-to-Lambda. More concurrency creates no new shard-2 consumers. Zero impact."
    - action: trigger_rollback
      why: "The bug is in the PRODUCER (mobile-sdk), not the consumer version. Rollback doesn't remove the bad record from the stream. v1.4.1 has different behavior but the poison record is still there."
    - action: restart_service
      why: "Lambda restarts and immediately hits the same poison record. Cold start delay, no improvement."

  debrief_context: |
    This scenario tests understanding of Kinesis ordering semantics — a fundamental but
    often misunderstood property that makes poison pills catastrophically impactful.

    The conceptual trap: engineers who know SQS expect bad messages to go to a DLQ
    and processing to continue. Kinesis is different — there is no automatic DLQ for
    a Kinesis stream's Lambda consumer (unless explicitly configured), and the ordering
    guarantee means a stuck record blocks everything behind it in the same shard.

    Key misconceptions this scenario exploits:
    1. "Scale Lambda concurrency" — intuitive but wrong; shard-to-invocation is 1:1
    2. "Rollback the consumer" — wrong patient; the bug is in the producer, not the consumer
    3. "Restart Lambda" — same checkpoint, same record, same crash
    4. "Only shard 2 is affected so it's minor" — 20% of events, 43,200 in backlog, growing

    The diagnosis path is log-heavy by design:
    - Logs show the exact same sequence number in every error
    - Logs show user_id=null and sdk_version=mobile-sdk/2.8.3
    - Logs explicitly note that concurrency scaling won't help
    - The enrichment.go:84 source context in the logs hints at the exact fix needed

    Post-incident:
    - Add null check for all required event fields in the enrichment step
    - Consider enabling Kinesis Enhanced Fan-Out + OnFailure destination (DLQ)
    - Add consumer validation that rejects events missing both user_id and anonymous_id
    - mobile-sdk CI should test anonymous user event schema validation
    - Consider enabling Kinesis BISECT_ON_BATCH_FUNCTION_ERROR (though batch_size=1 already)
