wiki:
  pages:
    - title: "event-pipeline-service Runbook"
      content: |
        # event-pipeline-service Runbook

        ## Overview

        event-pipeline-service is a Lambda function that reads from `user-events-stream`
        (5 shards, Kinesis standard) and writes enriched events to `analytics-events` DynamoDB.

        **Stream:** `user-events-stream` (5 shards, 7-day retention)
        **Lambda:** `event-processor` (512MB, Go 1.21)
        **Batch size:** 1 (each Lambda invocation processes exactly 1 record)
        **Bisect on error:** disabled (batch size is already 1)

        ## Kinesis Ordering and Poison Pills

        ⚠️ **CRITICAL:** Kinesis guarantees strict ordering within a shard. Lambda processes
        records sequentially within a shard. If a record causes an unhandled error:

        1. Lambda retries the same record up to MAX_RETRY_ATTEMPTS (10)
        2. After max retries, backs off RETRY_BACKOFF_SECONDS (60), then retries again
        3. **The iterator NEVER advances past a failed record** — all subsequent records
           in the shard are blocked indefinitely

        This is called a "poison pill" — a single bad record that freezes an entire shard.

        ## Diagnosing a Frozen Shard

        **Symptoms:**
        - IteratorAge climbing on one shard, others normal
        - Lambda error rate = 20% (1/5 shards failing)
        - Same error, same sequence number, in every Lambda invocation log

        **Diagnosis steps:**
        1. Check CloudWatch Lambda logs — look for repeated errors on same sequence number
        2. Identify the partition key / user_id of the bad record
        3. Determine why the consumer is failing on this specific record
        4. Decide: fix consumer (preferred) or advance iterator (fast but loses event)

        ## Recovery Options

        ### Option 1: Fix the Consumer (Recommended)

        Deploy a null-check / defensive handler for the bad event type. Lambda processes
        the poison record gracefully (logs it, skips enrichment), deletes from stream,
        iterator advances, shard unblocks.

        **Time to recovery:** 10-15 minutes (Lambda deploy + shard catchup)
        **Data loss:** None — bad event is logged and forwarded without enrichment

        ### Option 2: Advance the Iterator Manually

        Use the Kinesis API to move the shard iterator past the bad sequence number:

        ```bash
        aws kinesis get-shard-iterator \
          --stream-name user-events-stream \
          --shard-id shardId-000000000002 \
          --shard-iterator-type AFTER_SEQUENCE_NUMBER \
          --starting-sequence-number 49647821234567890123456789012345
        ```

        Then update the Lambda event source mapping to start from the new iterator.

        **Time to recovery:** 2-5 minutes
        **Data loss:** The poison event is permanently lost. Recoverable from Firehose
        S3 backup: `s3://event-pipeline-backup/YYYY/MM/DD/shard-2/`

        ## What Does NOT Fix a Frozen Shard

        - **Scaling Lambda concurrency** — more workers all hit the same poison record
        - **Restarting Lambda** — resumes from the same stuck position
        - **Rollback** — the poison record is already in the stream; consumer version is irrelevant
          unless the rollback removes the crashing code path

    - title: "Kinesis Poison Pill Recovery Procedure"
      content: |
        # Kinesis Poison Pill Recovery Procedure

        ## Quick Identification

        ```bash
        # Check iterator age per shard
        aws cloudwatch get-metric-statistics \
          --namespace AWS/Kinesis \
          --metric-name GetRecords.IteratorAgeMilliseconds \
          --dimensions Name=StreamName,Value=user-events-stream \
          --statistics Maximum --period 60

        # Find the poison sequence number in Lambda logs
        aws logs filter-log-events \
          --log-group-name /aws/lambda/event-processor \
          --filter-pattern "NullPointerException" \
          --start-time $(date -d '1 hour ago' +%s000)
        ```

        ## Recovery Path A: Deploy Consumer Fix (Preferred)

        1. Add null check in `enrichment.go:84`:
           ```go
           if event.UserID == nil {
               return enrichAnonymous(event) // use session_id as anonymous identifier
           }
           ```
        2. Deploy v1.4.3 to Lambda
        3. Verify shard-2 iterator age starts decreasing
        4. Monitor catchup progress (2,400 events/min = ~18 min to drain 43,200 backlog)

        ## Recovery Path B: Manual Iterator Advance (Emergency)

        Use only if you cannot deploy a fix quickly.

        1. Get the poison sequence number from logs
        2. Create a new shard iterator starting AFTER the bad record:
           ```bash
           ITERATOR=$(aws kinesis get-shard-iterator \
             --stream-name user-events-stream \
             --shard-id shardId-000000000002 \
             --shard-iterator-type AFTER_SEQUENCE_NUMBER \
             --starting-sequence-number <POISON_SEQ> \
             --query 'ShardIterator' --output text)
           ```
        3. Trigger Lambda with the new iterator position
        4. The poison event is now lost — schedule replay from Firehose S3 backup

    - title: "mobile-sdk Event Schema Requirements"
      content: |
        # mobile-sdk Event Schema Requirements

        ## Required Fields (all events)

        Every event MUST have exactly one of:
        - `user_id` (string, non-null) — for authenticated users
        - `anonymous_id` (string, UUID v4) — for unauthenticated/anonymous users

        **NEVER send `user_id: null` or `anonymous_id: null`.**

        ## Anonymous User Flow

        For users who have not yet authenticated (e.g. first app launch):
        1. Generate a UUID v4 `anonymous_id` on first launch
        2. Store in device keychain
        3. Use `anonymous_id` for all events until user logs in
        4. After login: link `anonymous_id` to `user_id` via identity resolution

        ## SDK Version History

        | Version | Status | Notes |
        |---|---|---|
        | v2.8.3 | **CRITICAL BUG** | Anonymous users emit user_id=null. Fix in v2.8.4. |
        | v2.8.2 | Stable | Stable |
        | v2.8.1 | Stable | Stable |

        ## Consumer Defensive Handling

        Consumers (Lambda, Firehose processors) MUST handle null user_id gracefully.
        Do not panic — log the invalid event, emit a metric, use session_id as fallback
        identifier. See `enrichment.go` for the reference implementation.

