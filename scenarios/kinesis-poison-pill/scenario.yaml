log_patterns:
  - id: poison-record-fail
    level: ERROR
    service: event-pipeline-service
    message: "Lambda invocation FAILED: shard=shard-2 batch_size=1 attempt={n}/10 error=NullPointerException seq=49647821234567890123456789012345 user_id=null"
    interval_seconds: 2
    from_second: 0
    to_second: 1500
    jitter_seconds: 0

  - id: nil-pointer-panic
    level: ERROR
    service: event-pipeline-service
    message: "goroutine {n} [running]: enrichment.getUser(0x0, 0x0) enrichment.go:84 +0x1c — nil pointer dereference"
    interval_seconds: 2
    from_second: 0
    to_second: 1500
    jitter_seconds: 1

  - id: retry-warn
    level: WARN
    service: event-pipeline-service
    message: "shard-2 retry attempt {n} for seq=49647821234567890123456789012345. Iterator cannot advance past poison record."
    interval_seconds: 3
    from_second: 0
    to_second: 1500
    jitter_seconds: 1

  - id: iterator-age-escalation
    level: WARN
