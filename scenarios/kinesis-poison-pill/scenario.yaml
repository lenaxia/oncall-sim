ticketing:
  - id: PIPE-3317
    title: "event-pipeline-service: Kinesis shard 2 frozen — poison pill record blocking iterator"
    severity: SEV2
    status: open
    description: |
      ## Summary

      Shard 2 of `user-events-stream` is frozen. A single malformed event is blocking
      the shard iterator. Lambda retries the same record indefinitely. All 5 other shards
      are healthy.

      ## The Poison Record

      - **Sequence number:** 49647821234567890123456789012345
      - **Event type:** purchase_completed
      - **user_id:** `null` (invalid — all events must have a valid user_id or anonymous_id)
      - **Error:** `NullPointerException: getUser called with null user_id at enrichment.go:84`
      - **Retry count:** 4,891+ (Lambda retries 10x, waits 1min, retries again indefinitely)

      ## Root Cause

      mobile-sdk v2.8.3 (released 3.5h ago) introduced a bug where anonymous users
      (first app launch, pre-auth) emit events with `user_id=null` instead of an
      `anonymous_id`. ~0.3% of events are affected.

      ## Why Kinesis Ordering Guarantees Make This Catastrophic

      Within a shard, Kinesis guarantees ordering. Lambda cannot advance the iterator past
      a failed record — it must process records in sequence. One bad record = entire shard frozen.

      ## Impact

      - Shard 2 iterator age: 13,847s (3.8 hours of backlog)
      - Events behind: ~43,200
      - Analytics pipeline: ~20% of purchase events missing
      - Other shards: unaffected

      ## Resolution Options

      1. **Deploy Lambda null-check** (v1.4.3) — consumer handles null user_id gracefully,
         iterator advances, shard recovers. **Recommended.**
      2. **Advance shard iterator manually** — fast but loses the poison record permanently
         (recoverable from Firehose S3 backup, but requires manual replay)
      3. **Deploy mobile-sdk v2.8.4** — fixes the producer but won't unblock the current shard

    created_by: felix-huang
    assignee: trainee
    at_second: -60

  - id: PIPE-3318
    title: "analytics-warehouse: 3.8h gap in shard-2 event data — purchase funnel understated 20%"
    severity: SEV3
    status: open
    description: |
      ## Impact

      Shard 2 events missing from analytics warehouse since 3.8h ago.
      - Missing events: ~43,200
      - Affected: all user_ids in B-D hash range (~20% of user base)
      - Purchase funnel conversion metrics: understated by ~20%
      - Data recovery: possible via Kinesis Firehose S3 backup once Lambda resumes

    created_by: priya-data
    assignee: trainee
    at_second: 300

alarms:
  - id: alarm-iterator-age
    service: event-pipeline-service
    metric_id: queue_depth
    condition: "queue_depth > 10000 events behind on any shard (iterator age proxy)"
    severity: SEV2
    auto_fire: true
    auto_page: true
    onset_second: -10800
    page_message: "event-pipeline Kinesis iterator age > 5 minutes on shard 2. Consumer may be stuck."
  - id: alarm-lambda-errors
    service: event-pipeline-service
    metric_id: error_rate
    condition: "Lambda error rate > 15%"
    severity: SEV2
    auto_fire: true
    auto_page: false
    onset_second: -10800
  - id: alarm-dlq-poison
    service: event-pipeline-service
    metric_id: queue_depth
    condition: "queue_depth > 10000 events behind on any shard"
    severity: SEV3
    auto_fire: true
    auto_page: false
    onset_second: -10500

