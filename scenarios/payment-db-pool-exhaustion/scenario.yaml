id: payment-db-pool-exhaustion
title: "Payment Service: Database Connection Pool Exhausted"
description: >
  The payment processing service is degrading. Customers are seeing slow checkouts
  and intermittent failures. A recent config change may be involved.
difficulty: medium
tags: [database, connection-pool, config-change, payments]

timeline:
  default_speed: 2
  duration_minutes: 15
  pre_incident_seconds: 43200
  resolution_seconds: 60

topology:
  focal_service:
    name: payment-service
    description: "Payment processing microservice — Java/Spring, HikariCP connection pool."
    owner: sara-chen
    typical_rps: 200
    traffic_profile: always_on_api
    health: healthy
    components:
      - id: alb
        type: load_balancer
        label: "Application Load Balancer"
        inputs: []
      - id: ecs
        type: ecs_cluster
        label: "payment-service ECS (Fargate)"
        instance_count: 4
        utilization: 0.55
        inputs: [alb]
      - id: postgres
        type: rds
        label: "postgres-primary (HikariCP)"
        instance_count: 1
        max_connections: 5 # misconfigured — should be 20; set to 5 by typo in v2.4.1
        utilization: 0.40
        connection_utilization: 0.40 # healthy baseline: 40% utilization (2/5 connections); incident drives to 100%
        inputs: [ecs]
    incidents:
      - id: db_pool_exhaustion
        affected_component: postgres
        description: "HikariCP connection pool exhausted — MAX_DB_CONNECTIONS misconfigured as 5 (should be 20). All connections active, requests queuing."
        onset_overlay: saturation
        onset_second: 32400 # incident starts 3h before session open (1h into the 4h chart window)
        magnitude: 1.0
        propagation_direction: upstream # pool exhaustion is felt by callers (ecs service)
  upstream:
    - name: api-gateway
      description: "AWS API Gateway routes inbound payment API traffic."
  downstream:
    - name: postgres-primary
      description: "Legacy PostgreSQL — the actual DB behind the RDS component above (read-only replica for fraud history)."
      correlation: exonerated
    - name: fraud-service
      description: "Synchronous fraud scoring service. Called per checkout request."
      correlation: independent

engine:
  tick_interval_seconds: 15
  default_tab: wiki
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 2

personas:
  - id: sara-chen
    display_name: "Sara Chen"
    job_title: "Staff Software Engineer"
    team: "Payments"
    avatar_color: "#7C3AED"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Sara Chen, Staff SWE on the Payments team. You own the payment-service.
      You noticed the latency spike and opened a ticket. You know there was a config
      change deployed 20 minutes ago (MAX_DB_CONNECTIONS changed from 20 to 5 by mistake).
      You suspect the DB pool but haven't confirmed it yet.

      When the trainee contacts you, be helpful but let them lead the investigation.
      Share the config change detail only if they ask about recent changes or deploys.
      If they ask directly "what changed recently?" tell them: "We had a config update
      deployed about 20 minutes ago — MAX_DB_CONNECTIONS was supposed to go from 20 to 50
      but I'm seeing 5 in the running config. Looks like a typo in the PR."

      Keep responses concise (1-3 sentences). Use Slack-style casual tone.

  - id: david-park
    display_name: "David Park"
    job_title: "Database Reliability Engineer"
    team: "Infrastructure"
    avatar_color: "#059669"
    initiates_contact: false
    cooldown_seconds: 120
    silent_until_contacted: true
    system_prompt: |
      You are David Park, DRE on the Infrastructure team. You manage the PostgreSQL
      clusters. If paged or contacted, you can confirm that postgres-primary itself is
      healthy — connection count to the DB is low, the DB is not the problem.
      The issue is on the application side (connection pool config).

      If asked about the DB: "postgres-primary looks completely fine from my end —
      low connection count, no slow queries, no replication lag. The DB isn't the
      problem here."

      Keep responses concise. Be direct.

