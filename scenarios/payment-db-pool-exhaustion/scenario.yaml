      author: sara-chen

remediation_actions:
  - id: rollback_payment_v2_4_0
    type: rollback
    service: payment-service
    is_correct_fix: true
    target_version: v2.4.0
    side_effect: "Reverts to v2.4.0 (MAX_DB_CONNECTIONS=20). Pool recovers within 30s."

  - id: emergency_deploy_config_fix
    type: emergency_deploy
    service: payment-service
    is_correct_fix: true
    side_effect: "Deploys corrected config (MAX_DB_CONNECTIONS=50). Pool recovers within 30s."

  - id: restart_service
    type: restart_service
    service: payment-service
    is_correct_fix: false
    side_effect: "Service restarts with same bad config — pool exhausts again immediately."

evaluation:
  root_cause: >
    payment-service v2.4.1 was deployed 20 minutes before the incident with a typo in
    the DB connection pool config: MAX_DB_CONNECTIONS was set to 5 instead of the intended 50.
    With only 5 connections available and normal traffic (~200 rps), the pool exhausted
    immediately, causing all requests to queue and time out at the 30s connection timeout.
    The fix is to roll back to v2.4.0 or deploy a corrected config.

  relevant_actions:
    - action: view_deployment_history
      why: "Reveals v2.4.1 deployed 20 minutes before incident onset — key diagnostic step."
      service: payment-service
    - action: search_logs
      why: "HikariCP pool stats logs directly show pool exhaustion (idle=0, waiting=47)."
    - action: read_wiki_page
      why: "Payment-service runbook describes DB pool exhaustion and resolution steps."
    - action: trigger_rollback
      why: "Rolling back to v2.4.0 restores MAX_DB_CONNECTIONS=20 and resolves the incident."
      service: payment-service
      remediation_action_id: rollback_payment_v2_4_0
    - action: mark_resolved
      why: "Explicitly closing the incident confirms resolution and ends the simulation."

  red_herrings:
    - action: restart_service
      why: "Restarting does not change config — the service comes back with the same pool size of 5 and exhausts immediately."
    - action: suppress_alarm
      why: "Silencing alarms without investigating delays diagnosis and leaves the incident unresolved."
    - action: scale_cluster
      why: "Adding more instances doesn't help — each instance has only 5 connections, so scaling 4x gives 20 total (vs the normal single-instance pool of 20)."

  debrief_context: |
    This scenario tests the ability to diagnose a config regression under time pressure.
    The key diagnostic path is: check deployment history → see recent deploy → check logs
    for HikariCP pool stats → confirm pool exhaustion → correlate with config change →
    roll back or deploy fix.

    The most common mistakes are: (1) focusing on the database (DB is healthy — the pool
    stats log is the tell), (2) restarting the service (doesn't fix config), and (3) not
    checking the wiki runbook which describes this exact failure mode.
