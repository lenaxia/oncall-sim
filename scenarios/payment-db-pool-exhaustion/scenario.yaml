ticketing:
  - id: PAY-1042
    title: "payment-service: elevated latency and error rate"
    severity: SEV2
    status: open
    description: |
      ## Summary

      payment-service is experiencing elevated p99 latency (>8s) and ~15% error rate
      starting at approximately T+0. Checkout flow is degraded for customers.

      ## Symptoms

      - p99 latency: **8.4s** (baseline: ~120ms)
      - Error rate: **15.2%** (baseline: <0.5%)
      - Affected: all payment processing endpoints
      - DB health: postgres-primary appears healthy (low connection count)

      ## Timeline

      - T-0:20 — Config change deployed (payment-service v2.4.1)
      - T+0:00 — Latency spike begins
      - T+0:05 — PagerDuty alert fires
      - T+0:08 — This ticket opened

      ## Hypotheses

      1. Config change (v2.4.1) introduced a regression
      2. Database issue (DB appears healthy — lower priority)
      3. Upstream traffic spike (RPS looks normal)

    created_by: sara-chen
    assignee: trainee
    at_second: -60

