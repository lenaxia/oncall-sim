wiki:
  pages:
    - title: "payment-service Runbook"
      content: |
        # payment-service Runbook

        ## Overview

        payment-service handles all payment processing. It connects to `postgres-primary`
        via HikariCP connection pool.

        **Critical config values** (set via environment variables):
        | Variable | Default | Notes |
        |---|---|---|
        | `MAX_DB_CONNECTIONS` | 20 | HikariCP maxPoolSize |
        | `MIN_IDLE` | 5 | Minimum idle connections |
        | `CONNECTION_TIMEOUT_MS` | 5000 | Max wait time for a connection |

        ## Common Incidents

        ### DB Connection Pool Exhaustion

        **Symptoms:**
        - HikariCP log: `Pool stats (total=N, active=N, idle=0, waiting=M)` where idle=0
        - High p99 latency (connections queuing)
        - Errors: "Connection is not available, request timed out"

        **Diagnosis:**
        1. Check logs for HikariCP pool stats — `idle=0` and `waiting>0` confirms exhaustion
        2. Check `MAX_DB_CONNECTIONS` config value in running service
        3. Compare against expected value (should be 20+)

        **Resolution options (in order of preference):**
        1. **Config fix deploy** — if pool size is misconfigured, deploy corrected config
        2. **Emergency deploy** — if a hotfix is ready
        3. **Rollback** — if the bad config was introduced in the most recent deploy

        ### High Error Rate (not pool-related)

        Separate playbook — see "payment-service Error Rate Runbook".

    - title: "HikariCP Tuning Guide"
      content: |
        # HikariCP Connection Pool Tuning

        ## Key Parameters

        `maximumPoolSize` — maximum number of connections the pool will maintain.
        Formula: `((core_count * 2) + effective_spindle_count)`. For our 4-core
        instances connecting to a remote DB: **recommended value is 20–30**.

        Setting this too low (e.g. 5) will cause pool exhaustion under any meaningful
        load. Setting it too high wastes DB connections.

        ## Reading Pool Stats in Logs

        ```
        HikariPool-1 - Pool stats (total=5, active=5, idle=0, waiting=47)
        ```

        - `total` — pool size (maxPoolSize)
        - `active` — connections currently in use
        - `idle` — connections available (0 = exhausted)
        - `waiting` — threads waiting for a connection

        A healthy pool should have `idle > 0` during normal operation.

    - title: "On-Call Escalation Policy"
      content: |
        # On-Call Escalation Policy — Payments

        ## Severity Definitions

        | Severity | Customer Impact | Response Time |
        |---|---|---|
        | SEV1 | Complete outage | Immediate (< 5 min) |
        | SEV2 | Degraded (>5% errors or >2s p99) | < 15 min |
        | SEV3 | Minor degradation | < 1 hour |
        | SEV4 | No customer impact | Next business day |

        ## Escalation Path

        1. **Primary on-call** (you) — first responder
        2. **Service owner** (Sara Chen, Payments) — if unresolved in 15 min
        3. **Infrastructure DRE** (David Park) — for DB/infra issues
        4. **VP Engineering** — for SEV1 only

        ## Runbooks

        - payment-service: `wiki/payment-service-runbook`
        - Database: `wiki/postgres-runbook`
        - Networking: `wiki/network-runbook`

