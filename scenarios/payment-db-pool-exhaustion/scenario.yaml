# Repeated connection-timeout errors fire every ~15s for the duration of the incident.
# jitter_seconds keeps them from looking metronomic; no seed so each session differs.
log_patterns:
  - id: pool-timeout
    level: ERROR
    service: payment-service
    message: "HikariCP - Connection is not available, request timed out after 30000ms"
    interval_seconds: 15
    from_second: 15
    to_second: 840
    jitter_seconds: 4

  - id: pool-stats
    level: WARN
    service: payment-service
    message: "HikariPool-1 - Pool stats (total=5, active=5, idle=0, waiting={n})"
    interval_seconds: 30
    from_second: 20
    to_second: 840
    jitter_seconds: 6

