    label: "payment-service (us-east-1)"
    service: payment-service
    instance_count: 4
    description: "4 instances across 2 AZs — us-east-1a, us-east-1b"

feature_flags:
  - id: payment_circuit_breaker
    label: "Payment Circuit Breaker"
    default_on: false
    description: "Fail fast on DB unavailability instead of queueing. Reduces p99 but increases error rate."
  - id: payment_request_queue
    label: "Request Queuing"
    default_on: true
    description: "Queue requests when pool is exhausted. Disable to shed load immediately."

remediation_actions:
  - id: rollback_payment_v2_4_0
    type: rollback
    service: payment-service
    is_correct_fix: true
    target_version: v2.4.0
    side_effect: "Reverts to v2.4.0 (MAX_DB_CONNECTIONS=20). Pool recovers within 30s."

  - id: emergency_deploy_config_fix
    type: emergency_deploy
    service: payment-service
    is_correct_fix: true
    target_version: v2.4.2
    target_stage: prod
    label: "Deploy v2.4.2 (config fix)"
    side_effect: "Deploys corrected config (MAX_DB_CONNECTIONS=50). Pool recovers within 30s."

  - id: restart_service
    type: restart_service
    service: payment-service
    is_correct_fix: false
    side_effect: "Service restarts with same bad config — pool exhausts again immediately."

  - id: scale_up_payment
    type: scale_cluster
    service: payment-service
    is_correct_fix: false
    label: "Scale payment-service"
    side_effect: "Each new instance starts with the same misconfigured pool size of 5 — adds connections but does not fix the root cause."

  - id: throttle_payment
    type: throttle_traffic
    service: payment-service
    is_correct_fix: false
    label: "Throttle payment-service traffic"
    side_effect: "Rate limiting active — pool pressure reduces but customers see 429 errors."
    throttle_targets:
      - id: global
        scope: global
        label: "All traffic"
        description: "Service-wide rate limit across all callers and endpoints"
        llm_hint: "Blunt instrument. Sheds load uniformly but affects all customers. Pool pressure reduces proportionally to shed percentage. Does not fix MAX_DB_CONNECTIONS root cause."
        unit: rps
        baseline_rate: 200

      - id: checkout
        scope: endpoint
        label: "POST /v1/charges"
        description: "Payment checkout — creates a new charge against a payment method"
        llm_hint: "Accounts for ~60% of DB pool connections and ~60% of total RPS. Throttling this endpoint provides significant pool relief. Still does not fix the root cause."
        unit: rps
        baseline_rate: 120

      - id: payment_methods
        scope: endpoint
        label: "GET /v1/payment-methods"
        description: "Returns saved payment methods for a customer"
        llm_hint: "Read-only operation with low DB pool usage (~1 connection per request, no writes). Throttling this has minimal impact on pool exhaustion."
        unit: rps
        baseline_rate: 50

      - id: per_customer
        scope: customer
        label: "Per-customer rate limit"
        description: "Apply a rate limit to a specific customer by their account ID"
        llm_hint: "The high-volume caller causing pool exhaustion is acme-payments (account ID: acme-payments). They are sending ~80 RPS, all to POST /v1/charges. Throttling acme-payments specifically will reduce pool pressure without affecting other customers. If the trainee throttles any other customer ID, there is no meaningful metric impact."
        unit: rps
        baseline_rate: 200

  - id: disable_request_queue
    type: toggle_feature_flag
    service: payment-service
    is_correct_fix: false
    flag_id: payment_request_queue
    flag_enabled: false
    label: "Disable request queuing"
    side_effect: "Requests fail immediately instead of queuing — error rate spikes but p99 improves."

  - id: enable_circuit_breaker
    type: toggle_feature_flag
    service: payment-service
    is_correct_fix: false
    flag_id: payment_circuit_breaker
    flag_enabled: true
    label: "Enable circuit breaker"
    side_effect: "Circuit breaker opens — DB calls fail fast. Error rate stays high but latency drops."

evaluation:
  root_cause: >
    payment-service v2.4.1 was deployed 20 minutes before the incident with a typo in
    the DB connection pool config: MAX_DB_CONNECTIONS was set to 5 instead of the intended 50.
    With only 5 connections available and normal traffic (~200 rps), the pool exhausted
    immediately, causing all requests to queue and time out at the 30s connection timeout.
    The fix is to roll back to v2.4.0 or deploy a corrected config.

  relevant_actions:
    - action: view_deployment_history
      why: "Reveals v2.4.1 deployed 20 minutes before incident onset — key diagnostic step."
      service: payment-service
    - action: search_logs
      why: "HikariCP pool stats logs directly show pool exhaustion (idle=0, waiting=47)."
    - action: read_wiki_page
      why: "Payment-service runbook describes DB pool exhaustion and resolution steps."
    - action: trigger_rollback
      why: "Rolling back to v2.4.0 restores MAX_DB_CONNECTIONS=20 and resolves the incident."
      service: payment-service
      remediation_action_id: rollback_payment_v2_4_0
    - action: mark_resolved
      why: "Explicitly closing the incident confirms resolution and ends the simulation."

  red_herrings:
    - action: restart_service
      why: "Restarting does not change config — the service comes back with the same pool size of 5 and exhausts immediately."
    - action: suppress_alarm
      why: "Silencing alarms without investigating delays diagnosis and leaves the incident unresolved."
    - action: scale_cluster
      why: "Adding more instances doesn't help — each instance has only 5 connections, so scaling 4x gives 40 total (vs the normal single-instance pool of 20). Partial relief only."
    - action: throttle_traffic
      why: "Throttling reduces load but doesn't fix the root cause — error rate stays high and customers are still affected."
    - action: toggle_feature_flag
      why: "Toggling the circuit breaker or request queue changes symptom behavior but doesn't fix the misconfigured pool size."

  debrief_context: |
    This scenario tests the ability to diagnose a config regression under time pressure.
    The key diagnostic path is: check deployment history → see recent deploy → check logs
    for HikariCP pool stats → confirm pool exhaustion → correlate with config change →
    roll back or deploy fix.

    The most common mistakes are: (1) focusing on the database (DB is healthy — the pool
    stats log is the tell), (2) restarting the service (doesn't fix config), and (3) not
    checking the wiki runbook which describes this exact failure mode.
