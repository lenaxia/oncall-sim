  resolution_seconds: 60
  focal_service:
    name: payment-service
    scale:
      typical_rps: 200
      instance_count: 4
      max_connections: 5
    traffic_profile: always_on_api
    health: degraded
    incident_type: connection_pool_exhaustion
    metrics:
      - archetype: p99_latency_ms
        label: "p99 Latency"
        unit: "ms"
        critical_threshold: 2000
        warning_threshold: 500
        incident_peak: 8400
        onset_second: 0
        noise: high
      - archetype: error_rate
        label: "Error Rate"
        unit: "%"
        critical_threshold: 5
        warning_threshold: 2
        incident_peak: 15.2
        onset_second: 0
        noise: high
      - archetype: request_rate
        label: "Request Rate"
        unit: "rps"
        noise: low
      - archetype: connection_pool_used
        label: "DB Pool Wait"
        unit: "ms"
        critical_threshold: 1000
        incident_peak: 7800
        onset_second: 0
        noise: low
  correlated_services:
