      correlation: exonerated
      health: healthy
      overrides:
        - archetype: connection_pool_used
          label: "Active Connections"
          unit: "conns"
          baseline_value: 18
          incident_response:
            overlay: step_down
            onset_second: 0
            peak_value: 4
    - name: api-gateway
      correlation: independent
      health: healthy

