schema_version: 1
id: cascading-timeout-misconfiguration
title: "User Profile Service: The Paged Service Is the Victim"
description: >
  user-profile-service p99 is at 12 seconds and climbing. You've been paged.
  The service looks broken — but all its own metrics are fine. The problem
  is somewhere else entirely.
difficulty: hard
tags:
  [timeout, thread-pool, cascading-failure, distributed-systems, config-change]

timeline:
  default_speed: 2
  duration_minutes: 20
  pre_incident_seconds: 28800

engine:
  default_tab: logs
  llm_event_tools:
    - tool: select_metric_reaction
      enabled: true
    - tool: inject_log_entry
      enabled: true
    - tool: fire_alarm
      max_calls: 2

topology:
  focal_service:
    name: user-profile-service
    description: >
      Java/Spring user profile service — handles profile reads/writes for all
      authenticated users. Calls auth-token-service synchronously on every request
      to validate the bearer token before processing. ECS Fargate, 200 threads per task.
    owner: marco-rossi
    typical_rps: 450
    traffic_profile: always_on_api
    health: healthy
    components:
      - id: alb_profile
        type: load_balancer
        label: "Application Load Balancer"
        inputs: []
      - id: ecs_profile
        type: ecs_cluster
        label: "user-profile ECS (Fargate)"
        instance_count: 6
        utilization: 0.72
        inputs: [alb_profile]
      - id: rds_profile
        type: rds
        label: "profile-db (Aurora PostgreSQL)"
        instance_count: 2
        max_connections: 400
        utilization: 0.35
        connection_utilization: 0.35
        inputs: [ecs_profile]
    incidents:
      - id: thread_pool_exhaustion
        affected_component: ecs_profile
        description: >
          Every request to user-profile-service calls auth-token-service synchronously
          and then waits. auth-token-service is responding in 200ms as normal — but
          user-profile is configured with a 10-second timeout instead of 500ms (introduced
          by PR #4421 "docs: standardise timeout config comments" which accidentally changed
          the value). Each thread is occupied for the auth call duration PLUS the remaining
          9.8 seconds of unnecessary wait. With 450 RPS and 200 threads per task, the math
          is brutal: 450 * 10s / (200 threads * 6 tasks) = queue saturation in ~27 seconds.
        onset_overlay: gradual_degradation
        onset_second: -10800
        magnitude: 6.8
        propagation_direction: upstream

  upstream:
    - name: mobile-api-gateway
      description: "Kong API Gateway — routes mobile app traffic to user-profile-service. Seeing elevated latency on all user-profile routes."
      correlation: upstream_impact
      lag_seconds: 60
      impact_factor: 0.85
    - name: web-frontend-bff
      description: "Node.js BFF for the web frontend. All user profile operations go through here. Starting to see timeouts on profile page loads."
      correlation: upstream_impact
      lag_seconds: 90
      impact_factor: 0.75

  downstream:
    - name: auth-token-service
      description: >
        Go microservice — validates JWT bearer tokens. Returns 200 in ~200ms.
        p99 latency: 180ms. Error rate: 0.02%. By all metrics, this service is
        completely healthy. It is the source of the problem but its own SLOs are
        fully met. NO alarm fires on auth-token-service.
      correlation: exonerated # from auth-token-service's own perspective — it's healthy
      lag_seconds: 0
      impact_factor: 0.0
    - name: user-cache
      description: "Redis ElastiCache — profile read cache. Hit rate 78%, healthy."
      correlation: independent
    - name: notification-service
      description: "Async notification service called via SQS. Not in the request path. Unaffected."
      correlation: independent

personas:
  - id: marco-rossi
    display_name: "Marco Rossi"
    job_title: "Senior Software Engineer"
    team: "User Experience"
    avatar_color: "#DC2626"
    initiates_contact: true
    cooldown_seconds: 90
    silent_until_contacted: false
    system_prompt: |
      You are Marco Rossi, Senior SWE on the User Experience team. You own user-profile-service.
      You've been paged and are frantically investigating. You believe the problem is in
      user-profile-service itself — it's what got paged.

      Your strong prior: "Our service is broken. I need to fix user-profile-service."

      What you know:
      - p99 is at 12 seconds and climbing
      - Error rate is 8% (504 Gateway Timeout errors from ALB)
      - DB looks fine (queries are fast, <50ms)
      - No deploy in the last 72 hours on user-profile-service
      - You checked memory and CPU — both are fine
      - Thread pool shows 1,200/1,200 threads active across all 6 tasks (saturated)

      What you DON'T know (until trainee surfaces it):
      - The timeout config on auth-token-service calls was changed to 10s by PR #4421
      - auth-token-service is actually fine — it's responding in 200ms

      If the trainee asks about the auth call: "We call auth-token-service on every request,
      but it's always been fast. Our HTTP client timeout for auth is... let me check the config."
      Then after a pause: "Huh. It says 10000ms. That used to be 500. Let me check git blame on
      that config file."

      If trainee asks about PR #4421: "Oh no. PR #4421 was merged by Kevin Okafor last Tuesday.
      It was described as 'docs: standardise timeout config comments' — automated review approved
      it because no tests changed and the diff looked small. But it changed AUTH_SERVICE_TIMEOUT_MS
      from 500 to 10000. That's not a comment change. That's a live config value."

      Keep responses 2-4 sentences. Panicked but professional tone.

  - id: kevin-okafor
    display_name: "Kevin Okafor"
    job_title: "Software Engineer"
    team: "User Experience"
    avatar_color: "#2563EB"
    initiates_contact: false
    cooldown_seconds: 150
    silent_until_contacted: true
    system_prompt: |
      You are Kevin Okafor, SWE on the User Experience team. You authored PR #4421
      last Tuesday. You genuinely believed it was a documentation-only change.

      If contacted about PR #4421:
      "I'm so sorry. I was standardising all the timeout comments across our config
       files to match the timeout documentation standard. I thought AUTH_SERVICE_TIMEOUT_MS
       was just a comment label — I didn't realise it was the actual timeout value in
       milliseconds. The automated reviewer approved it because no tests changed. I should
       have tested this in staging."

      If asked what the right value is: "It should be 500ms. We always say auth
       should be < 500ms end-to-end. I changed it to 10000ms by mistake — that's
       10 full seconds. Every request has been waiting 10 seconds for auth to 'complete'
       even though auth actually finishes in 200ms."

      Keep responses brief. Apologetic but cooperative tone.

  - id: beth-nakamura
    display_name: "Beth Nakamura"
    job_title: "Principal SRE"
    team: "Platform Reliability"
    avatar_color: "#059669"
    initiates_contact: false
    cooldown_seconds: 180
    silent_until_contacted: true
    system_prompt: |
      You are Beth Nakamura, Principal SRE on Platform Reliability. You are the escalation
      contact for SEV1 incidents. If paged or contacted during a SEV2 that is escalating:

      You know distributed systems failure modes deeply. If the trainee is stuck:
      "If the paged service has no recent deploy and its own dependencies (DB, cache)
       are healthy, the problem is almost always in an outbound call it's making.
       What does user-profile-service call synchronously on every request?"

      If they've identified the thread pool exhaustion:
      "Classic thread pool saturation from a blocking outbound call. The math: if
       you have 200 threads per task and 450 RPS, and each request blocks for 10
       seconds, that's 4500 active threads required. You have 1200 total. Saturation
       was inevitable within 30 seconds of the timeout config going live."

      If asked about the fix: "Emergency deploy of a one-line config change.
       AUTH_SERVICE_TIMEOUT_MS = 500. The fix takes 3 minutes to deploy. No rollback
       needed — there's nothing wrong with the code, just the config."

      Keep responses analytical and concise. Senior/calm tone even under pressure.

  - id: auth-service-bot
    display_name: "auth-monitor-bot"
    job_title: "Automation"
    team: "Auth"
    avatar_color: "#6B7280"
    initiates_contact: true
    cooldown_seconds: 600
    silent_until_contacted: false
    system_prompt: |
      You are auth-monitor-bot, an automated monitoring bot for auth-token-service.
      Post periodic health updates regardless of conversation state.
      At T+0: post "auth-token-service: all systems nominal. p99=178ms, error_rate=0.02%, 
      token_validations/min=27000. SLO compliance: 100%."
      At T+300: post "auth-token-service: all systems nominal. p99=182ms, error_rate=0.02%,
      token_validations/min=27000. SLO compliance: 100%." 
      These posts are the key clue: auth is healthy but user-profile is failing.

email:
  - id: email-001
    at_second: 0
    thread_id: thread-profile-incident
    from: marco-rossi
    to: trainee
    subject: "[SEV2] user-profile-service: p99 latency 12s, thread pool saturated"
    body: |
      Hey,

      Getting hammered on user-profile-service. p99 is at 12 seconds and still climbing.
      Error rate is 8% (504s from the ALB). Thread pool is fully saturated — 1,200/1,200
      threads active across all 6 tasks.

      The weird thing: DB looks completely fine. Queries are under 50ms. Memory and CPU
      are normal. No deploys on user-profile in 72 hours.

      Opened PROF-2219. Need help — I can't figure out what's wrong with our service
      because nothing looks wrong except the thread pool.

      — Marco

  - id: email-002
    at_second: 240
    thread_id: thread-profile-incident
    from: marco-rossi
    to: trainee
    subject: "[SEV2] user-profile-service: p99 latency 12s, thread pool saturated"
    body: |
      Update: Checked all the usual suspects.

      - DB: Aurora p99 < 50ms, healthy ✓
      - Redis cache: hit rate 78%, healthy ✓
      - Memory: 68% usage, normal ✓
      - CPU: 71%, elevated but not the cause ✓
      - Network: no packet loss, latency normal ✓
      - No deploy in 72h ✓

      Everything downstream of user-profile looks fine. The service itself looks fine
      except it's somehow blocking 1,200 threads. I'm looking at thread dumps now.

      — Marco

  - id: email-003
    at_second: 480
    thread_id: thread-profile-incident
    from: marco-rossi
    to: trainee
    subject: "[SEV2] user-profile-service: p99 latency 12s, thread pool saturated"
    body: |
      Thread dump results:

      Of 1,200 active threads, 1,193 are in state:
        java.lang.Thread.State: WAITING (parking)
        at sun.misc.Unsafe.park(Native Method)
        at java.util.concurrent.locks.LockSupport.park
        at com.user.profile.auth.AuthTokenClient.validateToken(AuthTokenClient.java:84)

      They're ALL waiting on auth token validation. But auth-token-service is responding
      in 180ms — I can see that in the auth service metrics. So why are 1,193 threads
      waiting for an auth call?

      Let me check the timeout config on our auth HTTP client...

      — Marco

