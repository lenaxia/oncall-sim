wiki:
  pages:
    - title: "user-profile-service Runbook"
      content: |
        # user-profile-service Runbook

        ## Overview

        user-profile-service handles all user profile operations (read, update, avatar).
        Every request validates the bearer token by calling **auth-token-service** synchronously
        before processing. The auth call is in the hot path — it must be fast.

        ## HTTP Client Configuration

        Timeout values for outbound service calls (configured in `application.yml`):

        | Config Key | Default | Notes |
        |---|---|---|
        | `AUTH_SERVICE_TIMEOUT_MS` | 500 | **Read/write timeout for auth-token-service calls** |
        | `AUTH_SERVICE_CONNECT_TIMEOUT_MS` | 1000 | TCP connection establishment timeout |
        | `DB_QUERY_TIMEOUT_MS` | 5000 | Individual DB query timeout |
        | `CACHE_TIMEOUT_MS` | 200 | Redis cache operation timeout |

        ⚠️ **Critical:** `AUTH_SERVICE_TIMEOUT_MS` should NEVER exceed 1000ms. auth-token-service
        p99 is ~180ms. Setting this high causes thread pool starvation under any meaningful load.

        ## Thread Pool Saturation

        **Symptoms:**
        - p99 latency climbing to match timeout value
        - Thread pool metrics: active_threads = max_threads
        - 504 errors from ALB (requests timing out before getting a thread)
        - All threads blocked in the same location (check thread dump)

        **Diagnosis:**
        1. Take a thread dump: `jstack <pid>` or check ECS thread metrics
        2. Identify which call all threads are blocked on
        3. Check the configured timeout for that call vs. the service's actual p99
        4. If timeout >> actual p99, threads are wasting time waiting for a timeout
           that will never occur before the timeout expires

        **Why this causes saturation (the math):**
        - 450 RPS × 10s timeout = 4,500 concurrent "active" threads needed
        - Actual thread pool: 200 threads × 6 tasks = 1,200 threads available
        - Saturation at T+30s is mathematically guaranteed

        **Fix:**
        1. Reduce the offending timeout to a sane value
        2. Emergency deploy the config change
        3. Do NOT restart the service without fixing the timeout (restarts fill up again immediately)

    - title: "auth-token-service Overview"
      content: |
        # auth-token-service Overview

        ## Purpose

        Validates JWT bearer tokens for all backend services. Returns token claims
        on success (HTTP 200) or rejects invalid tokens (HTTP 401/403).

        ## SLOs

        | Metric | SLO | Current |
        |---|---|---|
        | p99 latency | < 500ms | ~180ms |
        | Availability | 99.9% | 99.98% |
        | Error rate | < 0.1% | 0.02% |

        ## Important Note for Callers

        auth-token-service is fast. Your configured timeout for auth calls should be
        **500ms or less**. If you set a timeout of multiple seconds, you are not protecting
        against auth-token-service being slow — you are guaranteeing that each of your
        threads will be held for that duration on every request, regardless of how fast
        auth responds.

        Recommended: `AUTH_SERVICE_TIMEOUT_MS = 500`
        Absolute maximum: `AUTH_SERVICE_TIMEOUT_MS = 1000`

    - title: "Cascading Failure Patterns"
      content: |
        # Cascading Failure Patterns

        ## Synchronous Dependency Timeout Propagation

        **Pattern:** Service A calls Service B synchronously. B is slow (or configured with
        a too-large timeout). A's thread pool exhausts. A appears broken. B looks fine.

        **Why it's deceptive:**
        - The paged service (A) is the victim, not the cause
        - B's own metrics show it's healthy — it IS healthy
        - No alarm fires on B — it's within SLO
        - A's metrics show saturation — engineers focus on A

        **Diagnosis checklist:**
        1. Is there a recent deploy on A? (No = A probably didn't introduce the bug)
        2. What does A's thread dump show? (All threads blocked in the same outbound call?)
        3. Is the blocked service (B) actually slow? (Check B's own metrics)
        4. If B is fast but A's threads are blocked on B: the timeout on A's B-client is too high

        **Fix:** Reduce the timeout on A's outbound client for B. Emergency deploy.
        Do NOT: scale A, restart A, investigate B for being broken (it isn't).

        ## Thread Pool Queuing Theory

        For a service with:
        - R = request rate (RPS)
        - T = per-request hold time (= outbound timeout if timeout is the bottleneck)
        - N = max thread pool size

        The service saturates when: R × T > N

        Example: 450 RPS × 10s = 4,500 concurrent threads needed. Pool size = 1,200.
        Saturation is inevitable. Time to saturation ≈ N / (R × T - N) × T seconds.
        At these values: saturation in ~27 seconds.

