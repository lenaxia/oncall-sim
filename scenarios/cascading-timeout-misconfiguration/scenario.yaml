remediation_actions:
  - id: emergency_deploy_timeout_fix
    type: emergency_deploy
    service: auth-token-service
    is_correct_fix: true
    target_version: v2.1.5
    target_stage: prod
    label: "Deploy v2.1.5: fix AUTH_SERVICE_TIMEOUT_MS = 500"
    side_effect: >
      v2.1.5 deployed with AUTH_SERVICE_TIMEOUT_MS=500. Within 90 seconds, user-profile
      thread pool starts draining — threads complete in 500ms instead of 10 seconds.
      p99 drops from 12s to 140ms within 3 minutes. Error rate returns to baseline.
      No data loss, no customer impact beyond the incident window.

  - id: rollback_auth_v2_1_3
    type: rollback
    service: auth-token-service
    is_correct_fix: true
    target_version: v2.1.3
    label: "Rollback auth-token-service to v2.1.3"
    side_effect: >
      Rolled back to v2.1.3 (AUTH_SERVICE_TIMEOUT_MS=500). Equivalent result to the
      emergency deploy. Thread pool drains within 90 seconds. Recovery identical.
      Slightly slower to execute than deploying a targeted config fix.

  - id: restart_user_profile
    type: restart_service
    service: user-profile-service
    is_correct_fix: false
    label: "Restart user-profile-service ECS tasks"
    side_effect: >
      All 6 ECS tasks restart. Thread pool clears temporarily. Within 27 seconds of
      startup, the thread pool saturates again — the timeout config is still 10000ms
      and the math is unchanged. p99 briefly drops to 140ms then climbs back to 12s.
      Requests during the restart window receive 503 errors.

  - id: scale_user_profile
    type: scale_cluster
    service: user-profile-service
    is_correct_fix: false
    label: "Scale user-profile-service to 12 tasks"
    side_effect: >
      12 ECS tasks now running, 2,400 total threads. Thread pool saturation is briefly
      relieved. However: 450 RPS × 10s timeout still requires 4,500 concurrent threads.
      The expanded pool saturates within 90 seconds. p99 drops from 12s to 11.2s for
      2 minutes, then returns to 12s. You've doubled infrastructure cost for negligible gain.

  - id: throttle_mobile_api
    type: throttle_traffic
    service: user-profile-service
    is_correct_fix: false
    label: "Throttle mobile API gateway to 50% traffic"
    side_effect: >
      Incoming RPS drops from 450 to 225. Thread pool saturation is delayed —
      225 RPS × 10s = 2,250 threads needed vs 1,200 available. Service partially
      recovers for ~4 minutes, then saturates again. Error rate drops from 8% to 3%
      but users are still experiencing degraded service. Buys time but not a fix.
    throttle_targets:
      - id: all-profile-traffic
        scope: global
        label: "All profile traffic"
        description: "Rate limit all incoming requests to user-profile-service"
        llm_hint: "Reducing RPS below 120 (= 1200 threads / 10s timeout) would theoretically prevent saturation, but at 120 RPS you're serving 27% of normal capacity. Does not fix the root cause."
        unit: rps
        baseline_rate: 450

evaluation:
  root_cause: >
    PR #4421 "docs: standardise timeout config comments" (merged 7 days ago, authored by
    Kevin Okafor) accidentally changed AUTH_SERVICE_TIMEOUT_MS in auth-token-service's
    config from 500ms to 10000ms. Because auth-token-service responds in ~180ms, every
    thread in user-profile-service completes the auth call in 180ms but then holds the
    thread for the remaining 9,820ms waiting for a timeout that will never fire. With
    450 RPS and only 1,200 threads, saturation is mathematically inevitable. The paged
    service (user-profile) is a victim — the cause is in a downstream service that is
    within its own SLO and generates no alerts. The fix is a one-line config change.

  relevant_actions:
    - action: search_logs
      why: >
        Logs reveal AUTH_SERVICE_TIMEOUT_MS=10000 in the config dump (log at T+60s),
        the 'thread held for 9819ms' warning, and critically: 'Git config history:
        AUTH_SERVICE_TIMEOUT_MS: 500 → 10000 (PR #4421)'. This is the smoking gun.
    - action: view_deployment_history
      why: >
        Shows user-profile has no recent deploy (3 days ago, unrelated feature).
        Shows auth-token-service deployed 7 days ago — 'docs: standardise timeout config
        comments'. The mislabeled PR is the critical clue.
    - action: direct_message_persona
      why: >
        Contacting Marco Rossi surfaces the thread dump (1193 threads blocked in
        AuthTokenClient.validateToken). Contacting Kevin Okafor confirms the accidental
        config change. Contacting Beth Nakamura provides the diagnosis framework if stuck.
    - action: read_wiki_page
      why: >
        'Cascading Failure Patterns' wiki page describes this exact failure mode and
        includes the thread pool saturation math. 'user-profile-service Runbook' documents
        the correct timeout values.
    - action: view_pipeline
      why: >
        Checking the auth-token-service pipeline reveals the 'docs: standardise timeout
        config comments' deploy from 7 days ago — corroborates the git history in logs.
    - action: trigger_rollback
      why: "Rolling back auth-token-service to v2.1.3 restores the 500ms timeout and resolves saturation within 90 seconds."
      service: auth-token-service
      remediation_action_id: rollback_auth_v2_1_3
    - action: mark_resolved
      why: "Confirms resolution once p99 returns to baseline."

  red_herrings:
    - action: restart_service
      why: "Restarting user-profile-service clears the thread pool for 27 seconds, then it saturates again with the same math."
    - action: scale_cluster
      why: "Doubling tasks doubles the thread pool but the timeout math still drives to saturation — just takes 90 seconds longer."
    - action: throttle_traffic
      why: "Throttling reduces load but requires dropping to 27% of normal capacity to prevent saturation. Treats the symptom, not the cause."
    - action: investigate_alert
      why: "Investigating auth-token-service's own alarms is a dead end — it has no alarms firing. The healthy service generates no signal."

  debrief_context: |
    This scenario specifically tests the ability to diagnose a victim service — where the
    paged service is not the cause of its own degradation. This is one of the most
    disorienting failure modes in distributed systems: every instinct says "fix the broken
    service" but the broken service is innocent.

    The diagnostic chain:
    1. No recent deploy on user-profile → it didn't introduce the bug
    2. Thread dump shows all threads blocked in AuthTokenClient → outbound call is the bottleneck
    3. auth-token-service metrics show p99=180ms → it's NOT slow
    4. If auth is fast but threads are blocking for 10s → the timeout is configured wrong
    5. Logs show AUTH_SERVICE_TIMEOUT_MS=10000 and git history shows PR #4421 changed it
    6. Fix: change to 500ms, emergency deploy or rollback

    Common mistakes:
    - Restarting user-profile (buys 27 seconds, then fails again)
    - Scaling user-profile (doubles the delay to saturation, not a fix)
    - Focusing on auth-token-service being the problem (it's working perfectly)
    - Missing that the CI/CD pipeline commit message "docs: standardise timeout config
      comments" is misleading — it wasn't a docs change

    Post-incident: PR review process should require explicit human approval for any change
    to timeout configuration values, even if labeled as documentation.
