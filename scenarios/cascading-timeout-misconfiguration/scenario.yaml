ticketing:
  - id: PROF-2219
    title: "user-profile-service: p99 latency 12s, thread pool saturated, 8% 504 errors"
    severity: SEV2
    status: open
    description: |
      ## Summary

      user-profile-service is experiencing severe latency degradation. p99 is at 12 seconds
      and climbing. Thread pool is fully saturated. 8% of requests are timing out at the ALB
      (504 Gateway Timeout).

      ## Symptoms

      - p99 latency: **12.4s** and climbing (baseline: ~120ms)
      - Error rate: **8.1%** — 504 Gateway Timeout from ALB
      - Thread pool: **1,200/1,200 active** (fully saturated across all 6 tasks)
      - DB latency: **<50ms** — healthy
      - Cache hit rate: **78%** — healthy
      - No deploys on user-profile-service in 72 hours

      ## Thread Dump (sample)

      ```
      Thread[http-nio-8080-exec-127,5,main] WAITING
        at sun.misc.Unsafe.park(Native Method)
        at AuthTokenClient.validateToken(AuthTokenClient.java:84)
        [waiting for HTTP response — timeout not yet expired]
      ```

      Of 1,200 threads: 1,193 are blocked in `AuthTokenClient.validateToken()`

      ## Key Observation

      auth-token-service is reporting **p99=178ms, 100% SLO compliance**.
      But our threads are blocking for much longer. Why?

    created_by: marco-rossi
    assignee: trainee
    at_second: -60

  - id: PROF-2220
    title: "Mobile app: profile page load timeout — all users affected"
    severity: SEV3
    status: open
    description: |
      ## Customer Impact

      All mobile app users experiencing loading spinners on profile pages.
      Profile page is timing out after 15 seconds (mobile client timeout).
      Account settings, profile edits, and avatar uploads are all blocked.
      Estimated affected users: ~180,000 active sessions.

    created_by: marco-rossi
    assignee: trainee
    at_second: 120

