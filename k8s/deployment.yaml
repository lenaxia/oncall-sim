apiVersion: apps/v1
kind: Deployment
metadata:
  name: oncall-sim
  labels:
    app: oncall-sim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oncall-sim
  template:
    metadata:
      labels:
        app: oncall-sim
    spec:
      containers:
        # Static client container — serves pre-built dist/ via server.js
        - name: client
          image: oncall-client:latest
          ports:
            - containerPort: 3000
          env:
            # Shared HMAC secret — server.js signs tokens with this; proxy validates them.
            # This ensures only page loads served by this container can call the proxy.
            - name: PROXY_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: oncall-secrets
                  key: proxy-token-secret
            # Token TTL in seconds (optional — defaults to 3600)
            # - name: PROXY_TOKEN_TTL_SECONDS
            #   value: "3600"

        # LLM proxy sidecar — credentials never reach the browser
        - name: proxy
          image: oncall-proxy:latest
          ports:
            - containerPort: 8000
          env:
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: oncall-secrets
                  key: llm-model
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: oncall-secrets
                  key: llm-api-key
            - name: LLM_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: oncall-secrets
                  key: llm-base-url
            # Same shared HMAC secret — proxy validates tokens signed by server.js
            - name: PROXY_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: oncall-secrets
                  key: proxy-token-secret
            # Limit CORS to the client container (same pod, localhost)
            - name: CORS_ORIGINS
              value: "http://localhost:3000"
            # Per-IP rate limit in requests/minute (optional — defaults to 20)
            # - name: RATE_LIMIT_PER_MINUTE
            #   value: "20"
---
apiVersion: v1
kind: Service
metadata:
  name: oncall-sim
spec:
  selector:
    app: oncall-sim
  ports:
    - name: http
      port: 80
      targetPort: 3000
  type: ClusterIP
